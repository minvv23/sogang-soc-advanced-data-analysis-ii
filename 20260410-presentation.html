# 4월 10일 — 인과추론의 기본 개념
## 상관관계를 넘어서: "이 효과가 진짜인가"를 묻는 네 가지 전략

> <strong>SOC4013-01 고급데이터분석 Ⅱ(캡스톤디자인)</strong> | 2026년 봄학기 4주차
>
> 인터랙티브 프레젠테이션: https://minvv23.github.io/sogang-soc-advanced-data-analysis-ii/20260410-presentation.html

---

## 1. 회귀분석은 인과관계를 말해주는가? — 내생성(endogeneity)의 문제

### 지난주에서 이번 주로

지난주 수업에서 우리는 OLS 회귀분석의 메커니즘을 다뤘다. 평균이 회귀의 특수 경우라는 것, 계수의 의미가 "다른 변수를 통제했을 때의 조건부 평균 차이"라는 것, 그리고 p-value와 표준오차를 해석하는 법까지.

그런데 한 가지 질문을 계속 미뤄왔다. <strong>"성별이 부정선거론 수용에 미치는 효과가 9.8%p"라는 결과가 있을 때, 이것이 정말로 성별의 '효과'인가?"</strong>

OLS는 $X$와 $Y$ 사이의 <strong>통계적 연관(statistical association)</strong>을 추정한다. 그런데 연관(association)과 인과(causation)는 다르다. $X$와 $Y$가 함께 움직이는 것을 관찰했다고 해서, $X$가 $Y$를 <strong>만들었다(caused)</strong>고 말할 수 있는가?

### 내생성: OLS가 인과효과를 추정하지 못하는 이유

지난주에 외생성 가정 $E[\epsilon_i | X_i] = 0$이 가장 중요한 가정이라고 했다. 이것이 위반되는 상황을 <strong>내생성(endogeneity)</strong>이라 한다. 내생성이 있으면 OLS 추정치 $\hat{\beta}_1$은 인과효과가 아니라, 인과효과 + 편향의 합이 된다.

내생성이 발생하는 세 가지 경로:

<strong>경로 1: 누락 변수 편향 (Omitted Variable Bias)</strong>

$$\hat{\beta}_1^{\text{short}} \xrightarrow{p} \beta_1 + \beta_2 \cdot \delta$$

지난주에 다뤘던 공식이다. $X$와 $Y$ 모두에 영향을 미치는 변수 $Z$를 빠뜨리면, $Z$의 효과가 $X$의 효과인 것처럼 섞여 들어간다.

- 예: 성별 → 부정선거론에서, "온라인 커뮤니티 노출"을 빠뜨리면 → 남학생이 특정 커뮤니티에 더 많이 노출되고, 그 커뮤니티가 부정선거론을 키우는 것인데, 이것이 "성별의 효과"로 잡힌다

<strong>경로 2: 역인과 (Reverse Causality)</strong>

$X$가 $Y$를 만드는 게 아니라, $Y$가 $X$를 만드는 경우.

- 예: "경찰 수가 많은 도시일수록 범죄가 많다." 경찰이 범죄를 유발하는가? 아니다. 범죄가 많으니까 경찰을 더 배치한 것이다

<strong>경로 3: 선택 편향 (Selection Bias)</strong>

표본이 특정 방식으로 선택되어, 모집단과 다른 관계가 나타나는 경우.

- 예: "입원 환자 중에서 흡연자가 비흡연자보다 코로나 사망률이 낮다." → 입원이라는 조건(충돌 변수)으로 선택된 표본이므로, 모집단의 관계와 다르다

```mermaid
flowchart TD
    A["X와 Y 사이에<br/>통계적 연관이 관찰됨"] --> B{"이것이 인과인가?"}
    B -->|"문제 1"| C["누락 변수<br/>Z가 둘 다에 영향"]
    B -->|"문제 2"| D["역인과<br/>Y → X"]
    B -->|"문제 3"| E["선택 편향<br/>표본이 편향됨"]
    C --> F["OLS 추정치 ≠ 인과효과"]
    D --> F
    E --> F
    F --> G["<b>해결:</b> 인과추론 방법론"]
```

### "상관관계 ≠ 인과관계"를 넘어서

"상관관계는 인과관계가 아니다"라는 말은 맞지만, 거기서 멈추면 안 된다. 사회과학의 핵심 질문은 대부분 인과적이다. "최저임금 인상이 고용을 줄이는가?", "용산 이전이 교통 체증을 유발했는가?", "성별이 정치적 태도에 영향을 미치는가?" — 이 질문들에 답하려면, 단순 OLS를 넘어서 <strong>인과효과를 식별(identify)하는 전략</strong>이 필요하다.

이번 수업에서 다루는 것이 바로 그 전략들이다. 실험(RCT), 이중차분법(DID), 도구변수(IV), 회귀불연속설계(RDD) — 네 가지 접근, 각각의 핵심 아이디어와 가정을 살펴본다.

## 2. 인과추론의 언어: 잠재적 결과(Potential Outcomes)와 반사실(Counterfactual)

### 인과효과란 무엇인가

인과효과를 엄밀하게 정의하려면 <strong>잠재적 결과 프레임워크(Potential Outcomes Framework)</strong>가 필요하다. Donald Rubin이 체계화해서 <strong>Rubin Causal Model</strong>이라고도 부른다.

핵심 아이디어: 모든 개인 $i$에게는 두 가지 <strong>잠재적 결과(potential outcomes)</strong>가 존재한다.

- $Y_i(1)$: $i$가 처치(treatment)를 <strong>받았을 때</strong>의 결과
- $Y_i(0)$: $i$가 처치를 <strong>받지 않았을 때</strong>의 결과

$i$에 대한 <strong>개인 처치 효과(individual treatment effect)</strong>는:

$$\tau_i = Y_i(1) - Y_i(0)$$

<strong>예시 — 용산 이전과 교통량</strong>:

- $Y_i(1)$: 대통령실이 용산으로 이전<strong>한</strong> 세계에서 $i$번째 도로의 교통량
- $Y_i(0)$: 대통령실이 용산으로 이전하지 <strong>않은</strong> 세계에서 $i$번째 도로의 교통량
- $\tau_i = Y_i(1) - Y_i(0)$: 이전으로 인한 $i$번째 도로의 교통량 변화

### 인과추론의 근본 문제 (Fundamental Problem of Causal Inference)

문제는 <strong>한 사람(또는 한 도로)에 대해 $Y_i(1)$과 $Y_i(0)$을 동시에 관측할 수 없다</strong>는 것이다. 용산 이전은 일어났거나 일어나지 않았거나 둘 중 하나다. 같은 도로를 같은 시점에 "이전한 세계"와 "이전하지 않은 세계" 양쪽에서 동시에 관찰하는 것은 불가능하다.

우리가 관측하는 것은:

$$Y_i = D_i \cdot Y_i(1) + (1 - D_i) \cdot Y_i(0)$$

여기서 $D_i$는 처치 여부 (1이면 처치군, 0이면 대조군). 처치군에서는 $Y_i(1)$만, 대조군에서는 $Y_i(0)$만 관측된다. 관측되지 않는 쪽을 <strong>반사실(counterfactual)</strong>이라 부른다.

| | $Y_i(1)$ (처치 시) | $Y_i(0)$ (비처치 시) | 개인 효과 $\tau_i$ |
|--|--|--|--|
| 처치군 ($D_i = 1$) | <strong>관측</strong> | 반사실 (?) | ? |
| 대조군 ($D_i = 0$) | 반사실 (?) | <strong>관측</strong> | ? |

![인과추론의 근본 문제: 반사실은 관측할 수 없다](images/potential_outcomes_table.svg)

<strong>개인 수준의 인과효과 $\tau_i$는 절대 직접 관측할 수 없다.</strong> 이것이 인과추론의 근본 문제다.

### ATE와 ATT: 우리가 추정하려는 것

개인 효과를 볼 수 없으니, 우리는 <strong>평균적 효과</strong>를 추정한다.

<strong>ATE (Average Treatment Effect)</strong>: 모집단 전체에 대한 평균 처치 효과.

$$\text{ATE} = E[Y_i(1) - Y_i(0)] = E[Y_i(1)] - E[Y_i(0)]$$

<strong>ATT (Average Treatment Effect on the Treated)</strong>: 실제로 처치를 받은 집단에 대한 평균 효과.

$$\text{ATT} = E[Y_i(1) - Y_i(0)\ |\ D_i = 1]$$

용산 이전 예시에서:
- ATE: "만약 서울의 모든 도로가 대통령실 출근길에 놓였다면, 평균 교통량 변화는 얼마인가?" — 현실적이지 않은 질문
- ATT: "실제로 출근길 영향권에 있는 6개 도로에서, 이전으로 인한 교통량 변화는 얼마인가?" — 우리가 실제로 답하고 싶은 질문

많은 정책 평가에서 ATT가 더 관련성 있는 추정 대상이다.

## 3. 선택 편향(Selection Bias) — 왜 단순 비교가 틀리는가

### 처치군과 대조군의 단순 비교

인과효과를 추정하는 가장 순진한(naive) 방법은 "처치군의 평균 결과 - 대조군의 평균 결과"를 계산하는 것이다.

$$\underbrace{E[Y_i | D_i = 1] - E[Y_i | D_i = 0]}_{\text{관측 가능한 차이}}$$

이것을 분해해보면:

$$E[Y_i | D_i = 1] - E[Y_i | D_i = 0]$$

처치군에서는 $Y_i = Y_i(1)$이고, 대조군에서는 $Y_i = Y_i(0)$이므로:

$$= E[Y_i(1) | D_i = 1] - E[Y_i(0) | D_i = 0]$$

여기에 $E[Y_i(0) | D_i = 1]$을 빼고 더하면 (0을 더하는 트릭):

$$= \underbrace{E[Y_i(1) | D_i = 1] - E[Y_i(0) | D_i = 1]}_{\text{ATT}} + \underbrace{E[Y_i(0) | D_i = 1] - E[Y_i(0) | D_i = 0]}_{\text{선택 편향 (Selection Bias)}}$$

<strong>관측 가능한 차이 = ATT + 선택 편향</strong>

![단순 비교는 왜 틀리는가: 선택 편향의 분해](images/selection_bias.svg)

### 선택 편향이 의미하는 것

선택 편향 항 $E[Y_i(0) | D_i = 1] - E[Y_i(0) | D_i = 0]$은 <strong>"처치를 받은 집단이, 설령 처치를 받지 않았더라도, 대조군과 원래 달랐을 정도"</strong>를 나타낸다.

<strong>용산 이전 예시</strong>:

- 처치군: 사저 출근길 영향권 6개 도로 (한강대교, 동작대교, 반포대교 등)
- 대조군: 나머지 133개 도로

처치군 도로들은 대통령실 이전과 무관하게도 서울의 주요 교량이자 교통 요충지다. 이전이 없었어도 이 도로들의 교통량은 나머지 도로보다 <strong>원래 높았을 것이다</strong>. 이것이 선택 편향이다.

따라서 "이전 후 처치군의 교통량 - 대조군의 교통량"을 계산하면, 이전의 효과뿐 아니라 원래부터 있던 도로 간 차이까지 섞여 들어간다.

```mermaid
flowchart LR
    A["관측된 차이<br/>(처치군 평균 - 대조군 평균)"] --> B["ATT<br/>(진짜 인과효과)"]
    A --> C["선택 편향<br/>(처치 전부터<br/>있던 차이)"]
    B --> D["우리가 원하는 것"]
    C --> E["제거해야 하는 것"]
```

### 선택 편향을 제거하는 네 가지 전략

이 수업에서 다루는 네 가지 방법론은 모두 <strong>선택 편향을 제거하는 서로 다른 전략</strong>이다.

| 방법 | 선택 편향 제거 전략 |
|------|------------------|
| <strong>실험 (RCT)</strong> | 무작위 배정으로 처치군과 대조군을 사전에 동일하게 만든다 |
| <strong>이중차분법 (DID)</strong> | 시간에 따른 변화를 비교해서, 시간-불변 차이를 제거한다 |
| <strong>도구변수 (IV)</strong> | 처치와 상관되지만 결과에는 직접 영향이 없는 외생적 변이를 찾는다 |
| <strong>회귀불연속 (RDD)</strong> | 커트라인 근처에서 처치 배정이 "사실상 무작위"임을 이용한다 |

## 4. 실험(RCT)과 A/B 테스팅 — 무작위 배정이 해결하는 것

### 무작위 통제 실험 (Randomized Controlled Trial)

<strong>RCT의 핵심 아이디어</strong>: 참가자를 <strong>무작위(random)</strong>로 처치군과 대조군에 배정한다.

무작위 배정이 왜 강력한가? $D_i$(처치 여부)가 동전 던지기로 결정되면:

$$D_i \perp\!\!\!\perp (Y_i(1), Y_i(0))$$

처치 여부가 잠재적 결과와 <strong>독립(independent)</strong>이다. 쉽게 말하면, "처치를 받은 사람과 받지 않은 사람이 처치를 받기 전에는 평균적으로 동일하다."

이 경우 선택 편향이 정확히 0이 된다:

$$E[Y_i(0) | D_i = 1] - E[Y_i(0) | D_i = 0] = 0$$

왜냐하면 무작위 배정으로 인해 $E[Y_i(0) | D_i = 1] = E[Y_i(0) | D_i = 0] = E[Y_i(0)]$이기 때문이다. 처치군에 배정된 사람이나 대조군에 배정된 사람이나, 처치를 받지 않았을 때의 기대 결과가 같다.

따라서:

$$E[Y_i | D_i = 1] - E[Y_i | D_i = 0] = \text{ATE}$$

<strong>단순 평균 차이가 곧 인과효과가 된다.</strong> 별다른 통계적 기법이 필요 없다. 이것이 RCT가 인과추론의 "황금 표준(gold standard)"이라 불리는 이유다.

### A/B 테스팅: 산업계의 RCT

산업계에서 RCT를 부르는 이름이 <strong>A/B 테스팅</strong>이다. 원리는 정확히 같다.

| | 학계 (RCT) | 산업계 (A/B Test) |
|--|--|--|
| <strong>대상</strong> | 환자, 학생, 시민 등 | 사용자, 고객 |
| <strong>처치</strong> | 약물, 정책, 교육 프로그램 | 버튼 색상, 알고리즘, 가격 |
| <strong>결과 변수</strong> | 건강, 학업 성취, 정치 태도 | 클릭률, 전환율, 체류 시간 |
| <strong>표본 크기</strong> | 수십~수천 | 수만~수백만 |
| <strong>기간</strong> | 수개월~수년 | 수일~수주 |
| <strong>핵심 원리</strong> | 동일: 무작위 배정 → 선택 편향 제거 | 동일 |

첫 수업에서 "산업 현장에서는 복잡한 인과추론 모형보다 A/B 테스팅이 훨씬 실용적"이라고 했던 이유가 여기에 있다. A/B 테스팅은 인과추론의 가장 깔끔한 형태다. 무작위 배정이 가능하고, 표본이 크고, 반복 실험이 쉬우니까.

### RCT의 한계

RCT가 만능은 아니다. 다음 상황에서는 실험이 불가능하거나 바람직하지 않다.

<strong>1. 윤리적 제약</strong>:

"흡연이 폐암을 유발하는가?"를 검증하기 위해 사람을 무작위로 흡연군/비흡연군에 배정할 수 없다. "용산 이전이 교통 체증을 유발하는가?"를 검증하기 위해 대통령실을 무작위로 이전할 수 없다.

<strong>2. 현실적 제약</strong>:

"최저임금 인상이 고용을 줄이는가?"를 실험하려면 지역마다 다른 최저임금을 무작위로 적용해야 하는데, 이것은 정치적으로 불가능하다.

<strong>3. 외적 타당성 (External Validity)</strong>:

실험실에서 나온 결과가 현실 세계에서도 성립하는가? 실험 환경이 인위적일수록 일반화가 어렵다.

- <strong>내적 타당성 (Internal Validity)</strong>: "이 실험 내에서 인과효과가 올바르게 추정되었는가?" — RCT는 이것에 강하다
- <strong>외적 타당성 (External Validity)</strong>: "이 결과가 다른 집단, 다른 맥락에서도 성립하는가?" — RCT가 보장하지 못한다

<strong>4. SUTVA (Stable Unit Treatment Value Assumption)</strong>:

RCT가 성립하려면 <strong>"한 사람의 처치가 다른 사람의 결과에 영향을 미치지 않는다"</strong>는 가정이 필요하다. 이것을 SUTVA라 한다.

- 위반 예시: 백신 RCT에서, 처치군(백신 접종자)이 많아지면 대조군(미접종자)도 집단 면역 효과를 받는다. 처치군의 처치가 대조군의 결과를 바꾼 것이다
- 위반 예시: A/B 테스트에서 처치군 사용자가 대조군 사용자에게 새 기능을 알려주는 경우

```mermaid
flowchart TD
    A["<b>RCT (A/B Test)</b><br/>무작위 배정"] --> B["✅ 내적 타당성<br/>선택 편향 = 0"]
    A --> C["⚠️ 한계"]
    C --> D["윤리적 제약<br/>사람에게 해로운<br/>처치 불가"]
    C --> E["현실적 제약<br/>정책 무작위 배정<br/>불가능"]
    C --> F["외적 타당성<br/>실험실 ≠ 현실"]
    C --> G["SUTVA<br/>간섭 효과"]
```

### 실험이 불가능할 때의 대안

RCT가 불가능한 상황에서 인과효과를 추정하는 방법을 <strong>준실험적 방법(quasi-experimental methods)</strong> 또는 <strong>자연 실험(natural experiments)</strong>이라 한다. 핵심 아이디어는 동일하다: <strong>현실 세계에서 "마치 무작위 배정처럼" 작동하는 상황을 찾는 것</strong>.

이제부터 다루는 DID, IV, RDD가 바로 이 전략들이다. 그런데 이 세 가지가 동등하게 좋은 것은 <strong>아니다</strong>. 이 수업의 입장을 미리 밝히자면:

- <strong>DID</strong>: 실험 다음으로 가장 설득력 있는 전략이다. 가정(평행 추세)이 명확하고, 간접적으로나마 검증 가능하며, 직관적이다
- <strong>RDD</strong>: 개념적으로는 매우 깔끔한 디자인이다. 커트라인 근처에서 "사실상 무작위"라는 논리가 직관적이고 시각적으로도 설득력 있다. 다만 실질적으로는 IV의 변형이라는 약점이 있다
- <strong>IV</strong>: 이론적으로는 우아하지만, 실제 연구에서 설득력 있게 쓰기가 가장 어려운 방법이다. 현대 응용 경제학에서는 IV에 대한 회의론이 커지고 있다

이 위계를 염두에 두고 각 방법을 살펴보자.

## 5. 이중차분법(Difference-in-Differences) — "다른 도로 대비 얼마나 더 늘었는가"

### 잠깐 — 횡단면 데이터와 패널 데이터는 무엇이 다른가

지금까지 우리가 다뤄온 데이터는 전부 <strong>횡단면(cross-sectional) 데이터</strong>다. 1,070명의 응답자를 한 시점에 조사한 것. 각 행(row)이 한 사람이고, 시간 차원은 없다.

| 응답자 | 성별 | 소득 | 부정선거론 |
|--------|------|------|-----------|
| 1 | 남 | 350 | 62 |
| 2 | 여 | 420 | 38 |
| ... | ... | ... | ... |

DID는 이런 데이터로는 쓸 수 없다. DID에는 <strong>패널(panel) 데이터</strong>가 필요하다. 패널 데이터란 <strong>같은 개체를 여러 시점에 걸쳐 반복 관측한 데이터</strong>다.

| 도로 | 주차 | 교통량 |
|------|------|--------|
| 한강대교 | 2022-W11 | 84,200 |
| 한강대교 | 2022-W12 | 85,100 |
| ... | ... | ... |
| 한강대교 | 2022-W25 | 97,800 |
| 동작대교 | 2022-W11 | 82,500 |
| ... | ... | ... |

핵심적 차이: 패널 데이터에는 <strong>두 가지 차원의 변이(variation)</strong>가 있다.

- <strong>횡단면 변이 (between variation)</strong>: 같은 시점에서 도로 간 차이. "한강대교가 강변북로보다 교통량이 많다"
- <strong>시계열 변이 (within variation)</strong>: 같은 도로의 시간에 따른 변화. "한강대교의 교통량이 5월 이후 늘었다"

횡단면 데이터에서는 between variation밖에 없다. 패널 데이터에서는 둘 다 있으므로, <strong>"같은 도로가 시간에 따라 어떻게 변했는가"를 추적할 수 있다</strong>. 이것이 DID의 전제 조건이다.

수식으로 쓰면, 패널 데이터의 기본 구조는:

$$Y_{it} = \alpha_i + \lambda_t + \beta X_{it} + \epsilon_{it}$$

여기서 $i$는 개체(도로), $t$는 시점이다. $\alpha_i$는 도로별 고정 특성(위치, 차선 수 등), $\lambda_t$는 시점별 공통 충격(계절, 경기 등)이다. 횡단면 OLS에서는 $\alpha_i$를 통제할 수 없었지만, 패널 데이터에서는 이것을 차분이나 고정효과로 제거할 수 있다. <strong>이것이 패널 데이터의 힘이고, DID가 작동하는 기반이다.</strong>

### DID의 핵심 아이디어

이중차분법(Difference-in-Differences, DID)은 <strong>두 번의 차이(difference)</strong>를 구해서 인과효과를 추정하는 방법이다.

<strong>용산 이전 예시</strong>로 바로 들어가자.

첫 수업에서 이미 소개한 데이터: 서울시 139개 도로, 대통령실 용산 이전 전후 10주(2022.3.11~7.9).

- <strong>처치군</strong>: 사저 출근길 영향권 6개 도로
- <strong>대조군</strong>: 나머지 133개 도로
- <strong>처치 시점</strong>: 2022년 5월 10일 (윤석열 취임, 용산 이전)

단순 비교가 왜 안 되는지는 이미 봤다. 처치군 도로는 원래부터 교통량이 많은 주요 교량이다. "이전 후 처치군의 교통량"만 보면 이전의 효과와 원래의 도로 차이가 섞인다.

<strong>DID의 전략</strong>:

1. <strong>첫 번째 차이 (시간 차이)</strong>: 처치군의 이전 후 교통량 - 처치군의 이전 전 교통량
   - 이것은 "이전의 효과 + 시간에 따른 자연 변화"를 포함한다
2. <strong>두 번째 차이 (집단 간 차이)</strong>: 대조군의 이전 후 교통량 - 대조군의 이전 전 교통량
   - 이것은 "시간에 따른 자연 변화"만 포함한다
3. <strong>이중차분</strong>: (첫 번째 차이) - (두 번째 차이)
   - 시간에 따른 자연 변화가 상쇄되고, <strong>이전의 순수한 효과</strong>만 남는다

### 2×2 DID 테이블

| | 이전 전 (Pre) | 이전 후 (Post) | 시간 차이 |
|--|--|--|--|
| <strong>처치군</strong> (출근길 도로) | $\bar{Y}_{T,\text{pre}}$ | $\bar{Y}_{T,\text{post}}$ | $\Delta_T = \bar{Y}_{T,\text{post}} - \bar{Y}_{T,\text{pre}}$ |
| <strong>대조군</strong> (나머지 도로) | $\bar{Y}_{C,\text{pre}}$ | $\bar{Y}_{C,\text{post}}$ | $\Delta_C = \bar{Y}_{C,\text{post}} - \bar{Y}_{C,\text{pre}}$ |
| <strong>집단 간 차이</strong> | | | $\hat{\tau}_{\text{DID}} = \Delta_T - \Delta_C$ |

가상의 숫자로 예시를 들면:

| | 이전 전 | 이전 후 | 시간 차이 |
|--|--|--|--|
| <strong>처치군</strong> (6개 도로) | 85,000대 | 98,000대 | +13,000대 |
| <strong>대조군</strong> (133개 도로) | 52,000대 | 57,000대 | +5,000대 |
| | | | <strong>DID = +8,000대</strong> |

처치군의 교통량은 13,000대 증가했지만, 대조군도 5,000대 증가했다 (계절 효과, 경제 활동 증가 등). 대조군의 변화를 빼면, 용산 이전으로 인한 순수한 효과는 <strong>+8,000대</strong>로 추정된다.

![이중차분법(DID): 용산 이전의 인과효과 추정](images/did_diagram.svg)

### DID의 회귀식 표현

DID를 회귀분석으로 표현하면:

$$Y_{it} = \beta_0 + \beta_1 \cdot \text{Treat}_i + \beta_2 \cdot \text{Post}_t + \beta_3 \cdot (\text{Treat}_i \times \text{Post}_t) + \epsilon_{it}$$

여기서:
- $\text{Treat}_i$: 처치군이면 1, 대조군이면 0
- $\text{Post}_t$: 이전 후면 1, 이전 전이면 0
- $\text{Treat}_i \times \text{Post}_t$: <strong>교차항</strong> — 처치군이면서 이전 후인 경우에만 1

| 계수 | 의미 |
|------|------|
| $\beta_0$ | 대조군의 이전 전 평균 ($\bar{Y}_{C,\text{pre}}$) |
| $\beta_1$ | 이전 전 시점에서 처치군과 대조군의 평균 차이 (원래부터 있던 집단 간 차이) |
| $\beta_2$ | 대조군의 시간에 따른 변화 (이전과 무관한 자연 변화) |
| $\beta_3$ | <strong>DID 추정치</strong> = 인과효과 ($\hat{\tau}_{\text{DID}}$) |

<strong>$\beta_3$가 핵심이다.</strong> 이것은 지난주에 배운 교차항(interaction effect)의 계수이며, "처치군에서 이전 후에 추가로 나타난 변화"를 포착한다.

이 회귀식을 2×2 테이블과 대응시키면:

| | 이전 전 | 이전 후 |
|--|--|--|
| <strong>대조군</strong> | $\beta_0$ | $\beta_0 + \beta_2$ |
| <strong>처치군</strong> | $\beta_0 + \beta_1$ | $\beta_0 + \beta_1 + \beta_2 + \beta_3$ |

$\beta_3 = (\bar{Y}_{T,\text{post}} - \bar{Y}_{T,\text{pre}}) - (\bar{Y}_{C,\text{post}} - \bar{Y}_{C,\text{pre}})$. 정확히 2×2 테이블의 이중차분이다.

### DID가 선택 편향을 제거하는 방법

DID가 선택 편향을 제거할 수 있는 이유는, <strong>시간-불변(time-invariant) 차이</strong>가 차분 과정에서 상쇄되기 때문이다.

처치군 도로가 대조군 도로보다 원래 교통량이 33,000대 많다. 이 차이는 이전 전에도, 이전 후에도 동일하다. 첫 번째 차이(시간 차이)를 구하면 이 33,000대는 사라진다. <strong>각 도로의 "고정 특성"(위치, 차선 수, 주변 인구 등)이 차분으로 제거되는 것이다.</strong>

이것은 사실 패널 데이터에서의 <strong>고정효과(fixed effects)</strong>와 동일한 논리다. 고정효과 모형은 각 개체(도로)의 시간-불변 특성을 제거함으로써, 시간에 따른 변화만을 비교한다.

## 6. DID의 핵심 가정: 평행 추세(Parallel Trends)

### 평행 추세 가정이란

DID가 인과효과를 올바르게 추정하려면 한 가지 핵심 가정이 필요하다:

> <strong>평행 추세 가정 (Parallel Trends Assumption)</strong>: 처치가 없었다면, 처치군과 대조군의 결과 변수는 같은 추세(trend)를 따랐을 것이다.

수식으로:

$$E[Y_{it}(0) | D_i = 1] - E[Y_{it}(0) | D_i = 0] = \text{상수} \quad \text{(시간에 따라 변하지 않음)}$$

직관적으로: "처치가 없었다면, 처치군과 대조군의 교통량은 같은 패턴으로 증가(또는 감소)했을 것이다." <strong>수준(level)이 같을 필요는 없다</strong>—처치군이 원래 33,000대 더 많아도 된다. 중요한 것은 <strong>변화의 패턴(추세)</strong>이 동일한 것이다.

![평행 추세 성립 vs 위반](images/parallel_trends.svg)

### 왜 이 가정이 중요한가

평행 추세 가정이 성립하지 않으면 DID 추정치가 편향된다.

<strong>가정이 성립하는 경우</strong>: 처치가 없었다면 처치군의 교통량 변화가 대조군과 같았을 것이므로, 대조군의 변화를 빼면 순수한 처치 효과만 남는다.

<strong>가정이 위반되는 경우</strong>: 예를 들어, 처치군 도로 인근에서 용산 이전과 무관하게 대형 상업시설이 개장했다면? 처치군의 교통량은 이전이 없었어도 대조군보다 더 증가했을 것이다. 이때 DID 추정치에는 "상업시설 효과"가 "이전 효과"로 섞여 들어간다.

```mermaid
flowchart TD
    A["<b>평행 추세 성립</b>"] --> B["처치 없었으면<br/>처치군과 대조군이<br/>같은 추세"]
    B --> C["DID = 순수 처치 효과"]

    D["<b>평행 추세 위반</b>"] --> E["처치 없었어도<br/>추세가 달랐을 것"]
    E --> F["DID = 처치 효과<br/>+ 추세 차이 (편향)"]
```

### 평행 추세를 어떻게 검증하는가

<strong>엄밀히 말하면, 평행 추세 가정은 검증 불가능하다.</strong> 왜냐하면 "처치가 없었다면 처치군이 어떻게 변했을 것인가"는 반사실(counterfactual)이기 때문이다. 관측할 수 없는 것을 검증할 수는 없다.

그러나 간접적 증거를 제시할 수 있다:

<strong>사전 추세 검증 (Pre-treatment trend test)</strong>: 처치가 일어나기 <strong>전</strong>의 데이터에서, 처치군과 대조군의 추세가 평행했는지 확인한다.

- 용산 이전 사례: 2022년 5월 이전의 수 개월간, 출근길 6개 도로와 나머지 133개 도로의 교통량 변화 추세가 평행했는지 시각적으로 확인
- 평행했다면: "처치 전에는 추세가 같았으니, 처치 후에도 같았을 것이라는 가정이 합리적이다"
- 평행하지 않았다면: DID의 핵심 가정이 의심스러우므로, 추정치를 신뢰하기 어렵다

<strong>Event Study Plot</strong>: 처치 시점 전후의 여러 기간에 대해 DID 계수를 추정하여 그래프로 나타낸 것이다.

$$Y_{it} = \alpha_i + \lambda_t + \sum_{k \neq -1} \gamma_k \cdot \mathbf{1}[t - t^{\ast} = k] \cdot \text{Treat}_i + \epsilon_{it}$$

여기서 $t^{\ast}$는 처치 시점이고, $k$는 처치 시점으로부터의 상대적 기간이다. $\gamma_k$를 $k$에 대해 그래프로 그리면:

- 처치 전 ($k < 0$): $\gamma_k$가 0 근처여야 한다 (= 사전 추세가 평행)
- 처치 후 ($k \geq 0$): $\gamma_k$가 0에서 벗어나면 처치 효과가 있다는 증거

<strong>핵심</strong>: Event study plot에서 처치 전 계수들이 모두 0 근처에 있으면, 평행 추세 가정이 처치 전에는 성립했다는 간접 증거가 된다. 그러나 이것이 처치 후에도 성립한다는 보장은 없다는 점을 항상 인식해야 한다.

### 평행 추세 가정이 위반될 수 있는 상황들

| 상황 | 위반 이유 | 예시 |
|------|----------|------|
| <strong>차별적 시간 추세</strong> | 처치군과 대조군이 서로 다른 경향을 따름 | 처치군 도로 인근의 재개발로 인한 교통량 자연 증가 |
| <strong>다른 정책의 동시 시행</strong> | 처치와 동시에 처치군에만 영향을 미치는 다른 사건 발생 | 이전 시점에 처치군 도로에서 도로 공사가 시작됨 |
| <strong>예측 효과 (Anticipation)</strong> | 처치군이 처치를 예상하고 사전에 행동 변화 | 이전 발표 직후, 출근길 우회가 시작됨 (처치 전에 이미 효과 발생) |

## 7. 도구변수(Instrumental Variables) — 이론적으로 우아하지만 실전에서 가장 위험한 전략

### DID를 쓸 수 없는 상황

DID는 "처치 전/후"와 "처치군/대조군"이 명확히 구분되는 상황에서 작동한다. 그런데 많은 인과적 질문에서 이런 구조가 없다.

- "교육 연수가 소득에 미치는 효과는?" — 교육을 "받기 전/후"로 나누기 어렵고, 교육 수준은 개인의 선택이다
- "흡연이 건강에 미치는 효과는?" — 흡연 여부는 무작위가 아니라 개인의 선택이다

이런 상황에서 OLS를 돌리면 내생성이 발생한다. 교육 연수($X$)와 소득($Y$)의 관계에서, 능력($Z$, 관측 불가)이 교육과 소득 모두에 영향을 미치기 때문이다. $X$가 내생적이므로 $E[\epsilon | X] \neq 0$이다.

도구변수(IV)는 이런 상황을 위해 고안된 방법이다. 아이디어 자체는 우아하다. 그러나 <strong>실전에서 설득력 있게 적용하기가 매우 어렵고, 현대 사회과학 방법론에서 IV에 대한 회의론이 점점 커지고 있다</strong>는 점을 미리 밝혀둔다. 왜 그런지는 뒤에서 다룬다.

### 도구변수의 아이디어

<strong>도구변수(Instrumental Variable, IV)</strong>의 아이디어는 이것이다: $X$의 변이(variation) 중에서 <strong>내생적이지 않은 부분만 골라서</strong> 사용하자.

$X$ 전체가 아니라, 어떤 외생적 변수 $Z$에 의해 발생한 $X$의 변이만 이용하면, 그 변이는 $\epsilon$과 무관하므로 편향 없이 인과효과를 추정할 수 있다.

이 $Z$를 <strong>도구변수(instrument)</strong>라 하고, 두 가지 조건을 만족해야 한다:

![도구변수(IV)의 인과 구조](images/iv_dag.svg)

<strong>조건 1 — 관련성 (Relevance)</strong>:

$$\text{Cov}(Z, X) \neq 0$$

도구변수 $Z$는 내생적 변수 $X$와 상관이 있어야 한다. $Z$가 $X$를 "밀어줘야(push)" 한다.

<strong>조건 2 — 배제 제약 (Exclusion Restriction)</strong>:

$$\text{Cov}(Z, \epsilon) = 0$$

도구변수 $Z$는 $X$를 <strong>통해서만</strong> $Y$에 영향을 미쳐야 한다. $Z$가 $Y$에 직접 영향을 미치면 안 된다.

```mermaid
flowchart LR
    Z["<b>Z</b><br/>도구변수"] -->|"관련성<br/>Cov(Z,X) ≠ 0"| X["<b>X</b><br/>내생적 변수"]
    X -->|"인과효과<br/>β₁"| Y["<b>Y</b><br/>결과 변수"]
    U["<b>U</b><br/>관측 불가<br/>(능력 등)"] -->|"내생성"| X
    U -->|"내생성"| Y
    Z -.-x|"❌ 배제 제약<br/>직접 영향 없음"| Y
```

### 2SLS: 2단계 최소제곱법

도구변수를 이용한 추정은 <strong>2SLS (Two-Stage Least Squares)</strong>로 수행한다.

<strong>1단계 (First Stage)</strong>: $X$를 $Z$에 대해 회귀한다.

$$X_i = \pi_0 + \pi_1 Z_i + v_i$$

예측값 $\hat{X}_i = \hat{\pi}_0 + \hat{\pi}_1 Z_i$를 구한다. 이 $\hat{X}_i$는 $Z$에 의해 "설명되는" $X$의 부분, 즉 외생적 변이만 담고 있다.

<strong>2단계 (Second Stage)</strong>: $Y$를 $\hat{X}$에 대해 회귀한다.

$$Y_i = \beta_0 + \beta_1 \hat{X}_i + \eta_i$$

$\hat{X}_i$는 $Z$에 의해 만들어졌고, $Z$는 외생적이므로, $\hat{X}_i$도 외생적이다. 따라서 2단계의 $\hat{\beta}_1$은 인과효과의 편향 없는 추정치가 된다.

$$\hat{\beta}_1^{\text{IV}} = \frac{\text{Cov}(Z, Y)}{\text{Cov}(Z, X)} = \frac{\text{reduced form}}{\text{first stage}}$$

이 공식의 직관: $Z$가 $Y$에 미치는 영향(reduced form)을 $Z$가 $X$에 미치는 영향(first stage)으로 나눈 것이다. $Z$는 $X$를 통해서만 $Y$에 영향을 미치므로, 이 비율이 $X \to Y$의 인과효과다.

### 유명 사례들

| 연구 | $X$ (내생적) | $Y$ (결과) | $Z$ (도구변수) | 아이디어 |
|------|-------------|-----------|--------------|---------|
| Angrist (1990) | 군 복무 | 소득 | 베트남전 징병 번호 (추첨) | 징병 번호는 무작위 → 군 복무와 상관 있지만 소득에 직접 영향 없음 |
| Angrist & Krueger (1991) | 교육 연수 | 소득 | 출생 분기 | 의무교육법상 출생 분기에 따라 졸업 시기가 달라짐 → 교육 연수에 영향 |
| Miguel et al. (2004) | 경제 성장 | 내전 발생 | 강수량 | 아프리카에서 강수량은 농업 생산(= 경제 성장)에 영향, 내전에는 직접 영향 없음 |

### 도구변수의 근본적 한계 — 왜 IV가 점점 덜 쓰이는가

IV의 문제는 단순히 "어렵다"가 아니라, <strong>방법론 자체의 구조적 취약성</strong>이다.

<strong>1. 배제 제약은 검증 불가능하다 — 그리고 이것이 결정적이다</strong>

"$Z$가 $X$를 통해서만 $Y$에 영향을 미친다"는 배제 제약은 <strong>데이터로 검증할 수 없다</strong>. 이것은 순전히 이론적 논증에 의존하는 가정이며, 거의 모든 경우에 논쟁의 여지가 있다.

실제 사례를 보면 이 문제가 얼마나 심각한지 알 수 있다:

- <strong>Angrist & Krueger (1991)</strong>의 출생 분기 도구: "출생 분기가 교육을 통해서만 소득에 영향을 미친다"고 주장했지만, 이후 연구에서 출생 분기가 가정 환경, 건강, 학교 시작 나이 등 다른 경로로도 소득에 영향을 미칠 수 있다는 반론이 제기됐다. Bound et al. (1995)은 이 도구변수가 약하기도 해서, 추정치가 사실상 의미 없을 수 있음을 보였다
- <strong>Miguel et al. (2004)</strong>의 강수량 도구: "강수량이 경제 성장을 통해서만 내전에 영향을 미친다"고 주장했지만, 강수량은 농업·수자원·질병·이주 등 다양한 경로로 사회 불안정에 영향을 미칠 수 있다

DID의 평행 추세 가정도 검증 불가능하지만, 적어도 <strong>사전 추세를 통해 간접적 증거</strong>를 제시할 수 있다. 배제 제약에는 이런 간접 검증 수단조차 없다.

<strong>2. 약한 도구변수 문제 — IV 추정치의 구조적 불안정성</strong>

$\hat{\beta}_1^{\text{IV}} = \frac{\text{Cov}(Z, Y)}{\text{Cov}(Z, X)}$에서 분모 $\text{Cov}(Z, X)$가 작으면, 작은 오차가 결과를 크게 흔든다. 약한 도구변수를 쓰면 IV 추정치는 <strong>OLS보다 편향이 더 클 수 있다</strong>—인과추론을 하겠다고 쓴 방법이 오히려 상황을 악화시키는 것이다.

1단계 $F$-통계량으로 도구의 강도를 판단하는 관행이 있지만, 특정 수치를 기계적 기준으로 삼는 것은 위험하다. 중요한 것은 숫자가 아니라, <strong>1단계 관계가 이론적으로 강하고 실질적으로 의미 있는 크기인가</strong>를 판단하는 것이다.

<strong>3. LATE — "누구에 대한 효과인지 모른다"</strong>

IV가 추정하는 것은 ATE가 아니라 <strong>LATE(Local Average Treatment Effect)</strong>다. LATE는 "도구변수에 의해 처치 여부가 바뀌는 사람들(compliers)에 대한 평균 처치 효과"다. 그런데 이 compliers가 누구인지, 전체 모집단에서 어떤 비율인지, 우리가 관심 있는 집단을 대표하는지 알 수 없다. <strong>효과가 있긴 한데 누구에 대한 효과인지 모르는 상황</strong>이 되는 것이다.

<strong>4. 현대 응용 연구의 추세</strong>

2000년대 이후 "credibility revolution" 이후, IV 논문은 점점 엄격한 심사를 받고 있다. 리뷰어들이 배제 제약에 대해 훨씬 더 까다로운 논증을 요구하면서, <strong>설득력 있는 도구변수를 찾기가 사실상 불가능에 가까운 경우가 많다</strong>. DID나 RDD처럼 연구 디자인 자체에서 식별이 드러나는 방법에 비해, IV는 "보이지 않는 가정"에 크게 의존한다는 점에서 학계의 신뢰가 상대적으로 떨어지고 있다.

<strong>이 수업의 입장</strong>: IV는 아이디어 자체는 이해할 가치가 있다. 특히 RDD가 Fuzzy일 때 IV 논리가 필요하기 때문이다. 그러나 독자적 인과추론 전략으로서 IV를 쓰는 것은 <strong>극도로 신중해야 한다</strong>. "도구변수를 찾았다"는 것은 연구의 시작이 아니라, 배제 제약을 설득력 있게 논증해야 하는 <strong>부담의 시작</strong>이다.

## 8. 회귀불연속설계(Regression Discontinuity Design) — 개념적으로 가장 깔끔한 준실험

### RDD의 핵심 아이디어

IV의 문제점을 지적한 직후에 RDD를 다루는 이유가 있다. <strong>RDD는 개념적으로 가장 깔끔한 준실험적 디자인이면서, 동시에 기술적으로는 IV와 깊은 관계에 있기 때문</strong>이다. 이 긴장 관계를 이해하는 것이 중요하다.

어떤 처치가 <strong>연속적인 점수(running variable)의 특정 커트라인(cutoff)</strong>을 기준으로 배정되는 상황을 생각하자.

- 선거에서 득표율 50%를 넘으면 당선, 넘지 못하면 낙선
- 장학금이 평점 3.5 이상이면 지급, 미만이면 미지급
- 특정 프로그램에 소득이 기준선 이하면 참여 가능

이런 상황에서 <strong>커트라인 바로 위와 바로 아래의 사람들</strong>을 비교하는 것이 RDD의 전략이다.

<strong>왜 이것이 인과추론에 유용한가?</strong> 커트라인 바로 위(50.1%)와 바로 아래(49.9%)의 후보는, 득표율이 0.2%p밖에 차이 나지 않는다. 이 미세한 차이는 사실상 <strong>운(luck)</strong>이다. 선거 당일 날씨, 약간의 투표율 변동 등에 의해 결정된 것이지, 후보의 본질적 차이를 반영하지 않는다.

따라서 커트라인 근처에서는 처치 배정이 <strong>"사실상 무작위(as-if random)"</strong>다. 커트라인 바로 위의 사람들(처치군)과 바로 아래의 사람들(대조군)은, 그 점수를 제외하면 평균적으로 동일하다.

![회귀불연속설계(RDD): 커트라인에서의 인과효과](images/rdd_plot.svg)

### Sharp RDD vs. Fuzzy RDD

| | Sharp RDD | Fuzzy RDD |
|--|--|--|
| <strong>처치 배정</strong> | 커트라인에서 처치 확률이 0에서 1로 <strong>완전히</strong> 점프 | 커트라인에서 처치 확률이 <strong>불연속적으로 변하지만</strong> 0→1은 아님 |
| <strong>예시</strong> | 평점 3.5 이상이면 100% 장학금 지급 | 평점 3.5 이상이면 장학금 <strong>신청 자격</strong>이 주어지지만, 실제 수령 여부는 다름 |
| <strong>추정 방법</strong> | 커트라인 양쪽의 $E[Y]$ 차이 = 인과효과 | IV와 유사한 방법으로 추정 (커트라인 = 도구변수) |

대부분의 현실 상황은 Fuzzy RDD에 가깝다. 커트라인을 넘었다고 모든 사람이 처치를 받는 것은 아니기 때문이다.

<strong>여기서 핵심적인 연결이 보인다</strong>: Fuzzy RDD는 본질적으로 <strong>커트라인을 도구변수로 쓰는 IV</strong>다. "커트라인 초과 여부"가 $Z$이고, "실제 처치 여부"가 $X$인 2SLS를 커트라인 근처에서 돌리는 것이다. 따라서 Fuzzy RDD는 IV의 한계(배제 제약 검증 불가, LATE 해석 등)를 그대로 물려받는다.

그렇다면 RDD가 IV보다 나은 점은 무엇인가?

- <strong>Sharp RDD</strong>에서는 커트라인이 처치를 완전히 결정하므로, IV의 문제가 발생하지 않는다. 커트라인 근처에서 "사실상 무작위"라는 논리가 시각적으로도 직관적이고, 데이터만으로 설득력을 보여줄 수 있다
- <strong>조작 검증이 가능하다</strong>: McCrary test로 running variable의 밀도 분포를 확인하면, "사실상 무작위" 가정이 깨지는지를 간접적으로 검증할 수 있다. IV의 배제 제약에는 이런 검증 수단이 없다
- <strong>시각적 설득력</strong>: RDD는 산점도 하나로 효과를 "보여줄" 수 있다. 커트라인에서의 점프가 눈에 보이면, 그것 자체가 강력한 증거다

요약하면: <strong>RDD는 "개념적으로 깔끔한 디자인"이라는 점에서 IV보다 우위에 있지만, Fuzzy할 경우 IV의 위험을 공유한다</strong>. Sharp RDD 상황을 찾을 수 있다면 매우 설득력 있는 전략이다.

### Sharp RDD의 수식

Running variable을 $R_i$, 커트라인을 $c$라 하면:

$$D_i = \mathbf{1}[R_i \geq c]$$

인과효과의 추정:

$$\hat{\tau}_{\text{RDD}} = \lim_{r \downarrow c} E[Y_i | R_i = r] - \lim_{r \uparrow c} E[Y_i | R_i = r]$$

커트라인 바로 오른쪽에서의 $Y$ 기대값과 바로 왼쪽에서의 $Y$ 기대값의 차이다. $Y$가 커트라인에서 <strong>불연속적으로 점프</strong>하면, 그 점프가 처치의 인과효과다.

실제 추정에서는 커트라인 근처의 데이터만 사용하여 회귀분석을 돌린다:

$$Y_i = \alpha + \tau \cdot D_i + f(R_i - c) + \epsilon_i$$

여기서 $f(R_i - c)$는 running variable의 효과를 통제하는 함수(보통 다항식이나 로컬 선형 회귀)이고, $\tau$가 인과효과 추정치다.

### 유명 사례들

| 연구 | Running Variable | 커트라인 | 처치 | 결과 | 발견 |
|------|-----------------|---------|------|------|------|
| Lee (2008) | 선거 득표율 | 50% | 현직 효과 (당선) | 다음 선거 득표율 | 근소 당선 vs 근소 낙선 비교 → 현직 프리미엄 추정 |
| Carpenter & Dobkin (2009) | 나이 | 21세 (미국 음주 허용) | 합법적 음주 | 사망률 | 21세 직후 사망률 급증 → 음주의 건강 영향 |
| Pop-Eleches & Urquiola (2013) | 입학 시험 점수 | 학교별 커트라인 | 더 좋은 학교 입학 | 학업 성취 | 커트라인 바로 위/아래 비교 → 학교 질의 효과 |

### RDD의 한계

<strong>1. 로컬 추정치 (Local Estimate)</strong>

RDD가 추정하는 것은 <strong>커트라인 근처에서의 인과효과</strong>일 뿐이다. 득표율 50% 근처에서 추정된 현직 프리미엄이, 득표율 70%로 압승한 후보에게도 동일하게 적용되는지는 알 수 없다. IV의 LATE와 마찬가지로, 일반화에 주의가 필요하다.

<strong>2. 대역폭(bandwidth) 선택</strong>

"커트라인 근처"를 얼마나 좁게 잡을 것인가? 좁게 잡으면 무작위성은 높아지지만 표본이 줄어들어 추정이 부정확해진다. 넓게 잡으면 표본은 커지지만 커트라인에서 먼 사람들이 포함되어 무작위 가정이 약해진다. 이 trade-off를 관리하는 것이 RDD의 실질적 도전이다.

<strong>3. 조작(manipulation) 가능성</strong>

개인이 커트라인을 알고 running variable을 조작할 수 있으면 RDD가 무너진다. 예를 들어, 장학금 커트라인이 3.5인 것을 학생이 알고 교수에게 성적 조정을 요청한다면, 커트라인 근처에서 "사실상 무작위"라는 가정이 깨진다.

- 검증 방법: running variable의 분포가 커트라인에서 <strong>불연속적으로 밀집(bunching)</strong>되어 있지 않은지 확인한다 (McCrary density test)

```mermaid
flowchart TD
    A["<b>RDD</b>"] --> B["장점"]
    A --> C["한계"]
    B --> D["커트라인 근처에서<br/>사실상 무작위"]
    B --> E["시각적으로<br/>직관적"]
    C --> F["로컬 추정치<br/>(일반화 어려움)"]
    C --> G["대역폭 선택에<br/>민감"]
    C --> H["조작 가능성<br/>검증 필요"]
```

## 9. 네 가지 전략의 비교 — 동등하지 않다

### 위계가 있다

이번 수업에서 네 가지 방법을 다뤘지만, 이것들이 동등한 선택지는 아니다. <strong>설득력의 위계</strong>가 존재한다.

```mermaid
flowchart TD
    A["<b>Tier 1: 실험 (RCT / A/B Test)</b><br/>무작위 배정 = 선택 편향 소거<br/>가정이 설계에 의해 보장됨"] --> B["<b>Tier 2: DID</b><br/>평행 추세 가정 필요하지만<br/>간접 검증 가능 + 직관적"]
    B --> C["<b>Tier 3: RDD (Sharp)</b><br/>개념적으로 깔끔하지만<br/>로컬 추정치 + 조작 우려"]
    C --> D["<b>Tier 4: RDD (Fuzzy) ≈ IV</b><br/>배제 제약 검증 불가<br/>LATE 해석 문제"]
    D --> E["<b>Tier 5: OLS + 통제변수</b><br/>인과 해석 매우 제한적"]
```

왜 이런 위계가 생기는가? 핵심은 <strong>"가정의 투명성과 검증 가능성"</strong>이다.

| | 핵심 가정 | 검증 가능한가? | 가정이 깨지면? |
|--|--|--|--|
| <strong>RCT</strong> | 무작위 배정 | 배정 과정 자체로 보장 | 배정 과정의 결함 → 재실험 가능 |
| <strong>DID</strong> | 평행 추세 | 사전 추세로 간접 검증 가능 | event study plot으로 시각적 확인 |
| <strong>RDD (Sharp)</strong> | 커트라인 근처 무작위 | McCrary test로 간접 검증 가능 | 조작 여부를 데이터에서 탐지 가능 |
| <strong>IV / RDD (Fuzzy)</strong> | 배제 제약 | <strong>검증 불가능</strong> | 편향 방향조차 알 수 없음 |
| <strong>OLS</strong> | 외생성 ($E[\epsilon|X]=0$) | <strong>검증 불가능</strong> | 누락 변수 편향 |

<strong>위계의 기준은 명확하다</strong>: 가정이 투명하고 검증 가능할수록 설득력이 높다. RCT는 가정이 설계에 내장되어 있다. DID와 Sharp RDD는 가정을 간접적으로 검증할 수 있다. IV는 핵심 가정인 배제 제약을 검증할 방법이 없다—"믿어달라"고 논증하는 수밖에 없다.

### 실용적 판단 흐름

```mermaid
flowchart TD
    A["인과적 질문이 있다"] --> B{"무작위 배정이<br/>가능한가?"}
    B -->|"예"| C["<b>RCT / A/B Test</b><br/>가장 깔끔한 답"]
    B -->|"아니오"| D{"패널 데이터가 있고<br/>처치 시점이<br/>명확한가?"}
    D -->|"예"| E["<b>DID</b><br/>사전 추세 반드시 검증"]
    D -->|"아니오"| F{"처치 배정이<br/>커트라인에<br/>의존하는가?"}
    F -->|"예 (Sharp)"| G["<b>Sharp RDD</b><br/>조작 검증 필수"]
    F -->|"예 (Fuzzy)"| H["<b>Fuzzy RDD ≈ IV</b><br/>배제 제약 논증 필요<br/>⚠️ IV의 위험 공유"]
    F -->|"아니오"| I["OLS + 통제변수<br/>인과 해석 극도로 신중"]
```

"어떤 방법이 가장 좋은가"가 아니라, <strong>"이 상황에서 가장 투명한 식별 전략은 무엇인가"</strong>를 묻는 것이다. 그리고 대부분의 사회과학 연구에서 실질적으로 가장 많이, 가장 설득력 있게 쓰이는 것은 <strong>DID</strong>다. 패널/반복 횡단면 데이터만 있으면 적용할 수 있고, 평행 추세 가정을 시각적으로 보여줄 수 있기 때문이다.

IV를 독자적 전략으로 쓰는 경우는 점점 줄어들고 있다. "좋은 도구변수를 찾았다"고 주장하는 논문은 이제 심사 과정에서 매우 높은 논증 부담을 지게 되며, 배제 제약에 대한 회의론을 극복하기가 갈수록 어렵다.

## 10. Identification > Estimation — 인과추론에서 정말 중요한 것

### "어떻게 추정하는가"보다 "왜 이것이 인과효과인가"

이 수업에서 가장 중요한 메시지는 이것이다:

> <strong>Identification(식별)이 Estimation(추정)보다 중요하다.</strong>

<strong>추정(Estimation)</strong>은 "OLS로 돌릴 것인가, 2SLS로 돌릴 것인가, 로버스트 표준오차를 쓸 것인가" 같은 기술적 문제다. 이것은 중요하지만, <strong>식별(Identification)</strong>이 확보되지 않으면 의미가 없다.

<strong>식별(Identification)</strong>은 "왜 이 추정치가 인과효과로 해석될 수 있는가?"에 대한 논증이다. 어떤 가정이 성립해야 하고, 그 가정이 이 맥락에서 합리적인지를 설명하는 것이다.

### 식별 전략의 핵심: "편향이 왜 없는가?"

모든 인과추론 방법의 핵심은 동일하다: <strong>"선택 편향이 왜 사라지는가?"를 설득력 있게 설명하는 것</strong>.

| 방법 | 식별 논증 | 논증의 설득력 |
|------|----------|-------------|
| <strong>RCT</strong> | "무작위 배정했으므로 처치군과 대조군이 사전에 동일하다" | 설계 자체가 보장 — 가장 강력 |
| <strong>DID</strong> | "처치가 없었다면 두 집단의 추세가 동일했을 것이다" | 사전 추세로 간접 입증 가능 — 강력 |
| <strong>RDD</strong> | "커트라인 근처에서 처치 배정이 사실상 무작위다" | 시각적으로 보여줄 수 있음 — 설득적 |
| <strong>IV</strong> | "도구변수가 $X$를 통해서만 $Y$에 영향을 미친다" | 검증 불가, 이론적 논증에 의존 — 취약 |

이 논증이 설득력 없으면, 아무리 정교한 추정 기법을 써도 결과를 믿을 수 없다. 반대로, 식별이 깔끔하면 단순한 OLS로도 인과효과를 추정할 수 있다 — DID가 바로 그런 예다 (교차항이 있는 OLS일 뿐이다). <strong>방법론의 복잡성과 설득력은 비례하지 않는다. DID는 기술적으로 가장 단순하면서도, 설득력 있는 식별을 제공하는 경우가 많다.</strong>

### 흔한 실수: 기법에 집착하고 식별을 무시하기

학부생과 대학원 초기 연구자들이 자주 하는 실수:

<strong>실수 1: "도구변수를 썼으니 인과효과다"</strong>

도구변수를 썼다는 것 자체가 인과효과를 보장하지 않는다. 배제 제약이 성립하는지, 도구가 충분히 강한지를 논증해야 한다. 나쁜 도구변수를 쓰면 OLS보다 더 나쁜 추정치가 나올 수 있다.

<strong>실수 2: "DID를 돌렸으니 인과효과다"</strong>

평행 추세 가정이 성립하는지 확인했는가? 사전 추세 검증을 하지 않고 DID를 돌리면, 사실은 편향된 추정치를 "인과효과"라고 주장하는 것이다.

<strong>실수 3: "통제변수를 많이 넣었으니 인과효과다"</strong>

지난주에 다뤘듯, 통제변수를 많이 넣는다고 내생성이 해결되지 않는다. 오히려 bad control 문제가 생길 수 있다. 누락 변수 편향은 "빠뜨린 변수"가 문제인데, 관측 불가능한 변수(능력, 동기, 선호 등)는 데이터에 없으니 통제할 수 없다.

### 좋은 실증 연구의 구조

첫 수업에서 "어떤 데이터 분석이 중요한가"를 논의했다. 좋은 실증 연구(empirical research)는 대략 이런 구조를 따른다:

```mermaid
flowchart TD
    A["<b>1. 질문</b><br/>X가 Y에 인과적 영향을<br/>미치는가?"] --> B["<b>2. 식별 전략</b><br/>왜 이 방법이 인과효과를<br/>식별하는가?"]
    B --> C["<b>3. 가정의 명시</b><br/>어떤 가정이 필요하고<br/>그것이 합리적인가?"]
    C --> D["<b>4. 추정</b><br/>데이터 + 통계 기법으로<br/>계수 추정"]
    D --> E["<b>5. 강건성 검증</b><br/>가정이 약간 바뀌어도<br/>결론이 유지되는가?"]
    E --> F["<b>6. 해석</b><br/>효과의 크기가<br/>실질적으로 의미 있는가?"]
```

<strong>2단계(식별 전략)가 가장 중요하다.</strong> 여기가 약하면 나머지가 아무리 정교해도 연구 전체가 흔들린다.

### 이 수업의 남은 여정

| 날짜 | 주제 | 사용 방법론 | 실습 데이터 |
|------|------|-----------|-----------|
| 4월 3일 | 회귀분석 실습 | OLS + 통제변수 | 10대 청소년 정치성향 설문 |
| 5월 1일 | 패널 데이터 인과추론 실습 | DID + 고정효과 | 용산 이전 × 교통량 |
| 5월 29일 | 텍스트 분석 | embedding + 클러스터링 | 네이버·유튜브·디시 댓글 |

오늘 배운 인과추론의 프레임워크(잠재적 결과, 선택 편향, 식별 전략)는 이후 모든 실습의 기반이 된다. 특히 5월 1일의 DID 실습에서 오늘 이론으로 다룬 내용을 실제 데이터로 구현할 것이다.
</script>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

<script>
(function() {
  'use strict';

  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    themeVariables: {
      primaryColor: '#e8f0fe',
      primaryBorderColor: '#0055aa',
      primaryTextColor: '#1a1a2e',
      lineColor: '#0055aa',
      secondaryColor: '#f7f8fa',
      tertiaryColor: '#fff'
    },
    flowchart: { htmlLabels: true, curve: 'basis' },
    fontFamily: "'Noto Sans KR', sans-serif"
  });

  // ===== 0. CONFIGURE MARKED — disable strikethrough (~ is used in Korean text) =====
  marked.use({
    gfm: true,
    extensions: [{
      name: 'del',
      level: 'inline',
      start(src) { return undefined; },
      tokenizer(src) { return undefined; }
    }]
  });

  // ===== 1. EXTRACT MARKDOWN =====
  const rawMd = document.getElementById('markdown-source').textContent;

  // ===== 2. SPLIT INTO SLIDES =====
  function splitSlides(md) {
    const lines = md.split('\n');
    const slides = [];
    let buf = [];
    let currentSection = '';
    let currentSectionNum = '';
    let inTitle = true;
    let titleBuf = [];

    function flush() {
      if (buf.length > 0) {
        const text = buf.join('\n').trim();
        if (text) {
          slides.push({ type: 'content', section: currentSection, sectionNum: currentSectionNum, content: text });
        }
        buf = [];
      }
    }

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];

      // Title slide: collect until first ---
      if (inTitle) {
        if (/^---$/.test(line.trim())) {
          inTitle = false;
          slides.push({ type: 'title', content: titleBuf.join('\n').trim() });
          continue;
        }
        titleBuf.push(line);
        continue;
      }

      // Section divider: ## N. ...
      const sectionMatch = line.match(/^## (\d+)\.\s+(.*)/);
      if (sectionMatch) {
        flush();
        currentSectionNum = sectionMatch[1];
        currentSection = sectionMatch[2];
        slides.push({ type: 'divider', section: currentSection, sectionNum: currentSectionNum });
        continue;
      }

      // --- separator between sections
      if (/^---$/.test(line.trim())) {
        flush();
        continue;
      }

      // Subsection ### starts new slide
      if (/^### /.test(line)) {
        flush();
        buf.push(line);
        continue;
      }

      buf.push(line);
    }
    flush();
    return slides;
  }

  const slides = splitSlides(rawMd);

  // ===== 3. RENDERING HELPERS =====
  function protectMath(md) {
    const store = [];
    let idx = 0;

    // Display math $$...$$
    md = md.replace(/\$\$([\s\S]*?)\$\$/g, (m) => {
      const key = '\x00DISP' + (idx++) + '\x00';
      store.push({ key, val: m });
      return key;
    });

    // Inline math $...$  (not $$)
    md = md.replace(/(?<!\$)\$(?!\$)([^\$\n]+?)\$(?!\$)/g, (m) => {
      const key = '\x00INLN' + (idx++) + '\x00';
      store.push({ key, val: m });
      return key;
    });

    return { md, store };
  }

  function protectMermaid(md) {
    const store = [];
    let idx = 0;
    md = md.replace(/```mermaid\n([\s\S]*?)```/g, (m, code) => {
      const key = '\x00MERM' + (idx++) + '\x00';
      store.push({ key, val: code });
      return key;
    });
    return { md, store };
  }

  function restoreAll(html, mathStore, mermaidStore) {
    for (const { key, val } of mathStore) {
      html = html.split(key).join(val);
    }
    for (const { key, val } of mermaidStore) {
      html = html.split(key).join('<pre class="mermaid">' + val + '</pre>');
    }
    return html;
  }

  function renderMarkdown(content) {
    const m1 = protectMath(content);
    const m2 = protectMermaid(m1.md);
    let html = marked.parse(m2.md);
    html = restoreAll(html, m1.store, m2.store);
    return html;
  }

  // ===== 4. BUILD SLIDE ELEMENTS =====
  const container = document.getElementById('presentation');
  const slideEls = [];

  slides.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'slide';
    el.dataset.section = s.section || '';
    el.dataset.sectionNum = s.sectionNum || '';

    if (s.type === 'title') {
      el.classList.add('slide-title');
      // Parse title content
      const tlines = s.content.split('\n');
      let h1 = '', h2 = '', meta = '';
      for (const tl of tlines) {
        if (tl.startsWith('# ') && !tl.startsWith('## ')) h1 = tl.replace(/^# /, '');
        else if (tl.startsWith('## ')) h2 = tl.replace(/^## /, '');
        else if (tl.startsWith('> ')) meta = tl.replace(/^>\s*/, '').replace(/\*\*/g, '');
      }
      el.innerHTML = '<div class="slide-inner">' +
        '<h1>' + h1 + '</h1>' +
        '<h2>' + h2 + '</h2>' +
        '<div class="meta">' + meta + '</div></div>';
    } else if (s.type === 'divider') {
      el.classList.add('slide-divider');
      el.innerHTML = '<div class="slide-inner">' +
        '<div class="section-number">' + s.sectionNum + '</div>' +
        '<div class="section-title">' + s.section + '</div></div>';
    } else {
      el.classList.add('slide-content');
      const inner = document.createElement('div');
      inner.className = 'slide-inner';
      inner.innerHTML = renderMarkdown(s.content);
      el.appendChild(inner);
    }

    if (i !== 0) el.style.display = 'none';
    else el.classList.add('active');

    container.appendChild(el);
    slideEls.push(el);
  });

  // ===== 5. RENDER KATEX & MERMAID =====
  async function renderSpecial() {
    // KaTeX
    slideEls.forEach(el => {
      if (el.classList.contains('slide-content')) {
        renderMathInElement(el, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$', right: '$', display: false }
          ],
          throwOnError: false,
          trust: true
        });
      }
    });

    // Mermaid
    const mermaidEls = document.querySelectorAll('.mermaid');
    if (mermaidEls.length > 0) {
      // Temporarily show all slides so mermaid can measure
      slideEls.forEach(el => { el.style.display = 'flex'; el.style.visibility = 'hidden'; });
      try { await mermaid.run({ nodes: mermaidEls }); } catch(e) { console.warn('Mermaid error:', e); }
      slideEls.forEach((el, i) => {
        el.style.visibility = '';
        if (i !== currentSlide) { el.style.display = 'none'; el.classList.remove('active'); }
        else { el.style.display = 'flex'; el.classList.add('active'); }
      });
    }
  }

  // ===== 6. NAVIGATION =====
  let currentSlide = 0;
  const total = slideEls.length;

  const counterEl = document.getElementById('slide-counter');
  const progressEl = document.getElementById('progress-fill');
  const sectionEl = document.getElementById('section-indicator');

  function updateUI() {
    counterEl.textContent = (currentSlide + 1) + ' / ' + total;
    progressEl.style.width = ((currentSlide + 1) / total * 100) + '%';
    const sec = slideEls[currentSlide].dataset.sectionNum;
    const secName = slideEls[currentSlide].dataset.section;
    if (sec) sectionEl.textContent = sec + '. ' + secName;

    // White counter on dark divider slides
    const isDivider = slideEls[currentSlide].classList.contains('slide-divider');
    counterEl.style.color = isDivider ? 'rgba(255,255,255,0.5)' : '';
    sectionEl.style.color = isDivider ? 'rgba(255,255,255,0.4)' : '';
  }

  function goTo(n) {
    if (n < 0 || n >= total || n === currentSlide) return;
    slideEls[currentSlide].style.display = 'none';
    slideEls[currentSlide].classList.remove('active');
    currentSlide = n;
    slideEls[currentSlide].style.display = 'flex';
    slideEls[currentSlide].classList.add('active');
    slideEls[currentSlide].scrollTop = 0;
    updateUI();
  }

  window.nextSlide = function() { goTo(currentSlide + 1); };
  window.prevSlide = function() { goTo(currentSlide - 1); };

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ' || e.key === 'PageDown') {
      e.preventDefault(); nextSlide();
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'Backspace' || e.key === 'PageUp') {
      e.preventDefault(); prevSlide();
    } else if (e.key === 'Home') {
      e.preventDefault(); goTo(0);
    } else if (e.key === 'End') {
      e.preventDefault(); goTo(total - 1);
    }
  });

  // Click navigation removed — use keyboard arrows or nav buttons only

  // Touch swipe
  let touchStartX = 0;
  container.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
  container.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(dx) > 50) {
      if (dx < 0) nextSlide();
      else prevSlide();
    }
  }, { passive: true });

  // ===== 7. PAGE JUMP =====
  const pageJumpEl = document.getElementById('page-jump');
  const pageJumpInput = document.getElementById('page-jump-input');
  const pageJumpTotal = document.getElementById('page-jump-total');
  const pageJumpBtn = document.getElementById('page-jump-btn');

  pageJumpTotal.textContent = '/ ' + total;

  counterEl.addEventListener('click', (e) => {
    e.stopPropagation();
    counterEl.style.display = 'none';
    pageJumpEl.style.display = 'flex';
    pageJumpInput.value = '';
    pageJumpInput.focus();
  });

  function doJump() {
    const n = parseInt(pageJumpInput.value, 10);
    if (!isNaN(n) && n >= 1 && n <= total) {
      goTo(n - 1);
    }
    pageJumpEl.style.display = 'none';
    counterEl.style.display = '';
  }

  pageJumpBtn.addEventListener('click', doJump);
  pageJumpInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); doJump(); }
    if (e.key === 'Escape') { pageJumpEl.style.display = 'none'; counterEl.style.display = ''; }
    e.stopPropagation(); // prevent slide navigation while typing
  });
  pageJumpInput.addEventListener('keyup', (e) => e.stopPropagation());

  // Close jump box when clicking outside
  document.addEventListener('click', (e) => {
    if (pageJumpEl.style.display === 'flex' && !pageJumpEl.contains(e.target)) {
      pageJumpEl.style.display = 'none';
      counterEl.style.display = '';
    }
  });

  // ===== 8. INIT =====
  updateUI();
  renderSpecial();

})();
</script>
</body>
</html>
