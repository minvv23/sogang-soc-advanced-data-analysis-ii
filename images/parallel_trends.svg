<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 340" font-family="'Noto Sans KR', Pretendard, sans-serif">
  <defs>
    <marker id="ptArrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c62828"/>
    </marker>
    <marker id="ptArrowG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2e7d32"/>
    </marker>
  </defs>

  <rect width="750" height="340" fill="#fafafa" rx="8"/>

  <!-- ==================== LEFT PANEL: Parallel trends holds ==================== -->
  <rect x="15" y="10" width="355" height="320" fill="#f1f8e9" rx="8" stroke="#c5e1a5" stroke-width="1"/>

  <text x="192" y="36" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">평행 추세 성립</text>

  <!-- Left panel axes -->
  <line x1="65" y1="55" x2="65" y2="250" stroke="#999" stroke-width="1.2"/>
  <line x1="65" y1="250" x2="345" y2="250" stroke="#999" stroke-width="1.2"/>
  <text x="55" y="152" text-anchor="middle" font-size="10" fill="#555" transform="rotate(-90,55,152)">Y</text>
  <text x="205" y="268" text-anchor="middle" font-size="10" fill="#555">시간</text>

  <!-- Treatment time vertical line -->
  <line x1="195" y1="55" x2="195" y2="250" stroke="#999" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="195" y="280" text-anchor="middle" font-size="9" fill="#999">처치 시점</text>

  <!-- Pre-treatment: both lines parallel -->
  <!-- Treatment (blue): (90,180) -> (195,140) -->
  <line x1="90" y1="180" x2="195" y2="140" stroke="#1565c0" stroke-width="2.2"/>
  <!-- Control (gray): (90,220) -> (195,180) -->
  <line x1="90" y1="220" x2="195" y2="180" stroke="#888" stroke-width="2.2"/>

  <!-- Post-treatment -->
  <!-- Treatment actual (blue): (195,140) -> (310,90) jumps up -->
  <line x1="195" y1="105" x2="310" y2="75" stroke="#1565c0" stroke-width="2.2"/>
  <circle cx="195" cy="105" r="4" fill="#1565c0"/>
  <circle cx="310" cy="75" r="4" fill="#1565c0"/>

  <!-- Control (gray): (195,180) -> (310,150) -->
  <line x1="195" y1="180" x2="310" y2="150" stroke="#888" stroke-width="2.2"/>
  <circle cx="195" cy="180" r="4" fill="#888"/>
  <circle cx="310" cy="150" r="4" fill="#888"/>

  <!-- Counterfactual dashed (parallel to control from treatment pre endpoint) -->
  <!-- Treatment pre at 195: y=140, control goes from 180 to 150 (slope same). Counterfactual: (195,140) -> (310,110) -->
  <line x1="195" y1="140" x2="310" y2="110" stroke="#1565c0" stroke-width="1.8" stroke-dasharray="6,3"/>
  <circle cx="195" cy="140" r="3" fill="#1565c0"/>

  <!-- DID arrow at x=310 from counterfactual (110) to actual (75) -->
  <line x1="320" y1="110" x2="320" y2="77" stroke="#2e7d32" stroke-width="2"/>
  <polygon points="320,75 316,83 324,83" fill="#2e7d32"/>
  <polygon points="320,112 316,104 324,104" fill="#2e7d32"/>
  <text x="340" y="92" font-size="10" font-weight="bold" fill="#2e7d32">DID</text>
  <text x="340" y="104" font-size="9" fill="#2e7d32">(정확)</text>

  <!-- Labels -->
  <text x="82" y="175" text-anchor="end" font-size="9" fill="#1565c0">처치군</text>
  <text x="82" y="218" text-anchor="end" font-size="9" fill="#888">대조군</text>

  <!-- ==================== RIGHT PANEL: Parallel trends violated ==================== -->
  <rect x="380" y="10" width="355" height="320" fill="#ffebee" rx="8" stroke="#ef9a9a" stroke-width="1"/>

  <text x="557" y="36" text-anchor="middle" font-size="14" font-weight="bold" fill="#c62828">평행 추세 위반</text>

  <!-- Right panel axes -->
  <line x1="430" y1="55" x2="430" y2="250" stroke="#999" stroke-width="1.2"/>
  <line x1="430" y1="250" x2="710" y2="250" stroke="#999" stroke-width="1.2"/>
  <text x="420" y="152" text-anchor="middle" font-size="10" fill="#555" transform="rotate(-90,420,152)">Y</text>
  <text x="570" y="268" text-anchor="middle" font-size="10" fill="#555">시간</text>

  <!-- Treatment time vertical line -->
  <line x1="560" y1="55" x2="560" y2="250" stroke="#999" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="560" y="280" text-anchor="middle" font-size="9" fill="#999">처치 시점</text>

  <!-- Pre-treatment: lines DIVERGING (treatment steeper) -->
  <!-- Treatment (blue): (455,200) -> (560,140) — steeper -->
  <line x1="455" y1="200" x2="560" y2="140" stroke="#1565c0" stroke-width="2.2"/>
  <!-- Control (gray): (455,220) -> (560,195) — gentler -->
  <line x1="455" y1="220" x2="560" y2="195" stroke="#888" stroke-width="2.2"/>

  <!-- Post-treatment -->
  <!-- Treatment actual (blue): jumps and continues steep -->
  <line x1="560" y1="95" x2="675" y2="65" stroke="#1565c0" stroke-width="2.2"/>
  <circle cx="560" cy="95" r="4" fill="#1565c0"/>
  <circle cx="675" cy="65" r="4" fill="#1565c0"/>

  <!-- Control (gray): continues gentle -->
  <line x1="560" y1="195" x2="675" y2="175" stroke="#888" stroke-width="2.2"/>
  <circle cx="560" cy="195" r="4" fill="#888"/>
  <circle cx="675" cy="175" r="4" fill="#888"/>

  <!-- Wrong counterfactual (assumes parallel from control slope): (560,140) -> parallel to control -->
  <!-- Control slope: (175-195)/(675-560) = -20/115. CF from (560,140): at 675: 140-20=120 -->
  <line x1="560" y1="140" x2="675" y2="120" stroke="#1565c0" stroke-width="1.8" stroke-dasharray="6,3"/>
  <circle cx="560" cy="140" r="3" fill="#1565c0"/>

  <!-- True counterfactual (continues original steep trend) -->
  <!-- Treatment pre-slope: (140-200)/(560-455) = -60/105. From 560: at 675: 140 + (-60/105)*115 = 140-65.7 ~ 74 -->
  <line x1="560" y1="140" x2="675" y2="74" stroke="#e65100" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="690" y="72" font-size="8" fill="#e65100">실제</text>
  <text x="690" y="82" font-size="8" fill="#e65100">추세</text>

  <!-- DID arrow (wrong, biased) at x=685 from wrong counterfactual (120) to actual (65) -->
  <line x1="655" y1="120" x2="655" y2="67" stroke="#c62828" stroke-width="2"/>
  <polygon points="655,65 651,73 659,73" fill="#c62828"/>
  <polygon points="655,122 651,114 659,114" fill="#c62828"/>

  <!-- Bias annotation -->
  <!-- The true effect is 65-74 = -9 difference, DID measures 65-120 = -55. Bias portion: 74 to 120 -->
  <rect x="555" y="78" width="40" height="38" fill="#c62828" opacity="0.15" rx="2"/>
  <text x="538" y="100" text-anchor="end" font-size="10" font-weight="bold" fill="#c62828">편향</text>
  <line x1="540" y1="100" x2="555" y2="97" stroke="#c62828" stroke-width="1.2"/>

  <text x="670" y="92" font-size="9" font-weight="bold" fill="#c62828">DID</text>
  <text x="670" y="104" font-size="8" fill="#c62828">(과대추정)</text>

  <!-- Labels -->
  <text x="447" y="197" text-anchor="end" font-size="9" fill="#1565c0">처치군</text>
  <text x="447" y="218" text-anchor="end" font-size="9" fill="#888">대조군</text>

  <!-- Bottom annotation -->
  <rect x="50" y="295" width="650" height="32" fill="#fff3e0" rx="5" stroke="#ffcc80" stroke-width="1"/>
  <text x="375" y="316" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">핵심: DID의 유효성은 처치 이전에 두 집단의 추세가 평행했다는 가정에 전적으로 의존한다</text>
</svg>