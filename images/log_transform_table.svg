<svg xmlns="http://www.w3.org/2000/svg" width="750" height="320" viewBox="0 0 750 320" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <filter id="cellShadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000010"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="750" height="320" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="375" y="32" text-anchor="middle" fill="#1a1a2e" font-size="17" font-weight="700">로그 변환 모형의 네 가지 유형</text>

  <!-- Column headers -->
  <text x="280" y="60" text-anchor="middle" fill="#555" font-size="12" font-weight="600">종속변수: Y</text>
  <text x="560" y="60" text-anchor="middle" fill="#555" font-size="12" font-weight="600">종속변수: ln(Y)</text>

  <!-- Row headers -->
  <text x="32" y="140" text-anchor="middle" fill="#555" font-size="12" font-weight="600" transform="rotate(-90,32,140)">독립변수: X</text>
  <text x="32" y="255" text-anchor="middle" fill="#555" font-size="12" font-weight="600" transform="rotate(-90,32,255)">독립변수: ln(X)</text>

  <!-- ==================== TOP-LEFT: Level-Level ==================== -->
  <rect x="55" y="72" width="310" height="100" fill="#f5f8ff" rx="6" stroke="#ccd6e8" stroke-width="1" filter="url(#cellShadow)"/>
  <text x="210" y="96" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="700">Level-Level</text>
  <text x="210" y="118" text-anchor="middle" fill="#0055aa" font-size="13" font-weight="500">Y = β₀ + β₁X</text>
  <line x1="100" y1="128" x2="320" y2="128" stroke="#dde5f0" stroke-width="0.5"/>
  <text x="210" y="148" text-anchor="middle" fill="#1a1a2e" font-size="11.5">X가 1단위 증가</text>
  <text x="210" y="165" text-anchor="middle" fill="#1a1a2e" font-size="11.5" font-weight="600">→ Y가 β₁ 단위 증가</text>

  <!-- ==================== TOP-RIGHT: Log-Level ==================== -->
  <rect x="385" y="72" width="310" height="100" fill="#f2f7ff" rx="6" stroke="#b8c8e0" stroke-width="1" filter="url(#cellShadow)"/>
  <text x="540" y="96" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="700">Log-Level</text>
  <text x="540" y="118" text-anchor="middle" fill="#0055aa" font-size="13" font-weight="500">ln(Y) = β₀ + β₁X</text>
  <line x1="430" y1="128" x2="650" y2="128" stroke="#dde5f0" stroke-width="0.5"/>
  <text x="540" y="148" text-anchor="middle" fill="#1a1a2e" font-size="11.5">X가 1단위 증가</text>
  <text x="540" y="165" text-anchor="middle" fill="#1a1a2e" font-size="11.5" font-weight="600">→ Y가 β₁×100 % 변화</text>

  <!-- ==================== BOTTOM-LEFT: Level-Log ==================== -->
  <rect x="55" y="190" width="310" height="100" fill="#f2f7ff" rx="6" stroke="#b8c8e0" stroke-width="1" filter="url(#cellShadow)"/>
  <text x="210" y="214" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="700">Level-Log</text>
  <text x="210" y="236" text-anchor="middle" fill="#0055aa" font-size="13" font-weight="500">Y = β₀ + β₁ ln(X)</text>
  <line x1="100" y1="246" x2="320" y2="246" stroke="#dde5f0" stroke-width="0.5"/>
  <text x="210" y="266" text-anchor="middle" fill="#1a1a2e" font-size="11.5">X가 1% 증가</text>
  <text x="210" y="283" text-anchor="middle" fill="#1a1a2e" font-size="11.5" font-weight="600">→ Y가 β₁/100 단위 증가</text>

  <!-- ==================== BOTTOM-RIGHT: Log-Log (emphasized) ==================== -->
  <rect x="385" y="190" width="310" height="100" fill="#e8f0fe" rx="6" stroke="#0055aa" stroke-width="2" filter="url(#cellShadow)"/>
  <!-- Accent badge -->
  <rect x="609" y="195" width="80" height="18" fill="#0055aa" rx="9"/>
  <text x="649" y="207" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="600">자주 사용</text>
  <text x="540" y="214" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="700">Log-Log</text>
  <text x="540" y="236" text-anchor="middle" fill="#0055aa" font-size="13" font-weight="600">ln(Y) = β₀ + β₁ ln(X)</text>
  <line x1="430" y1="246" x2="650" y2="246" stroke="#b8cce8" stroke-width="0.5"/>
  <text x="540" y="266" text-anchor="middle" fill="#1a1a2e" font-size="11.5">X가 1% 증가</text>
  <text x="540" y="283" text-anchor="middle" fill="#0055aa" font-size="12" font-weight="700">→ Y가 β₁ % 변화 (탄력성)</text>
</svg>