<svg xmlns="http://www.w3.org/2000/svg" width="700" height="340" viewBox="0 0 700 340" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <style>
      text { font-family: 'Noto Sans KR', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="700" height="340" fill="#ffffff"/>

  <!-- Left panel: physical shadow analogy -->
  <text x="175" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">그림자 비유</text>

  <!-- Sun/light source -->
  <circle cx="175" cy="65" r="18" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
  <text x="175" y="70" text-anchor="middle" font-size="12" fill="#92400e">&#x2600;</text>

  <!-- Light rays -->
  <line x1="175" y1="83" x2="130" y2="170" stroke="#fcd34d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="175" y1="83" x2="175" y2="170" stroke="#fcd34d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="175" y1="83" x2="220" y2="170" stroke="#fcd34d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Stick figure (the object) -->
  <line x1="175" y1="120" x2="175" y2="190" stroke="#dc2626" stroke-width="3"/>
  <circle cx="175" cy="115" r="8" fill="none" stroke="#dc2626" stroke-width="2.5"/>
  <line x1="155" y1="145" x2="195" y2="145" stroke="#dc2626" stroke-width="3"/>
  <line x1="175" y1="190" x2="158" y2="220" stroke="#dc2626" stroke-width="3"/>
  <line x1="175" y1="190" x2="192" y2="220" stroke="#dc2626" stroke-width="3"/>
  <text x="210" y="165" font-size="14" font-weight="600" fill="#dc2626">3D 물체</text>

  <!-- Ground (the subspace) -->
  <line x1="60" y1="250" x2="290" y2="250" stroke="#64748b" stroke-width="2"/>
  <text x="175" y="270" text-anchor="middle" font-size="13" fill="#64748b">바닥 (2D 평면)</text>

  <!-- Shadow -->
  <ellipse cx="175" cy="250" rx="30" ry="5" fill="#1e293b" fill-opacity="0.2"/>
  <text x="175" y="295" text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">그림자 = 정사영</text>

  <!-- Divider -->
  <line x1="350" y1="20" x2="350" y2="320" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Right panel: OLS analogy -->
  <text x="525" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">OLS도 같은 원리</text>

  <!-- Y vector (high dimensional) -->
  <rect x="410" y="55" width="100" height="90" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="460" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">y</text>
  <text x="460" y="98" text-anchor="middle" font-size="11" fill="#991b1b">n차원 공간의</text>
  <text x="460" y="113" text-anchor="middle" font-size="11" fill="#991b1b">관측값 벡터</text>

  <!-- Arrow down -->
  <line x1="460" y1="150" x2="460" y2="195" stroke="#6b7280" stroke-width="2"/>
  <polygon points="452,190 460,205 468,190" fill="#6b7280"/>
  <text x="510" y="180" font-size="13" fill="#6b7280" font-weight="500">정사영!</text>

  <!-- Column space (the subspace) -->
  <rect x="400" y="210" width="120" height="55" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="460" y="232" text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">&#x177; = X&#x3B2;&#x302;</text>
  <text x="460" y="252" text-anchor="middle" font-size="11" fill="#1d4ed8">X의 열공간 위의 점</text>

  <!-- Residual label -->
  <rect x="540" y="140" width="100" height="45" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="590" y="160" text-anchor="middle" font-size="13" font-weight="600" fill="#16a34a">e = y - &#x177;</text>
  <text x="590" y="175" text-anchor="middle" font-size="11" fill="#15803d">수직 거리</text>

  <!-- Bottom summary -->
  <rect x="380" y="280" width="280" height="45" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="520" y="300" text-anchor="middle" font-size="13" fill="#334155">3D 물체 → 바닥에 그림자</text>
  <text x="520" y="318" text-anchor="middle" font-size="13" fill="#334155" font-weight="600">y → 열공간에 정사영 = OLS</text>
</svg>