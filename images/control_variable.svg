<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <defs>
    <style>
      text { font-size: 14px; fill: #333; }
      .title { font-size: 16px; font-weight: bold; fill: #222; }
      .label { font-size: 13px; fill: #555; }
      .value { font-size: 18px; font-weight: bold; }
      .annotation { font-size: 12px; fill: #777; font-style: italic; }
      .bracket-text { font-size: 14px; font-weight: bold; fill: #d32f2f; }
    </style>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="400" fill="#fafafa" rx="8"/>

  <!-- 왼쪽: 통제 전 -->
  <text x="145" y="35" text-anchor="middle" class="title">통제 전</text>
  <text x="145" y="55" text-anchor="middle" class="annotation">(단순 평균 비교)</text>

  <!-- Y축 -->
  <line x1="60" y1="75" x2="60" y2="320" stroke="#999" stroke-width="1.5"/>
  <text x="15" y="200" text-anchor="middle" transform="rotate(-90, 15, 200)" class="label">부정선거론 수용률 (%)</text>

  <!-- Y축 눈금 -->
  <line x1="55" y1="95" x2="60" y2="95" stroke="#999"/>
  <text x="50" y="99" text-anchor="end" class="label">60</text>
  <line x1="55" y1="155" x2="60" y2="155" stroke="#999"/>
  <text x="50" y="159" text-anchor="end" class="label">45</text>
  <line x1="55" y1="215" x2="60" y2="215" stroke="#999"/>
  <text x="50" y="219" text-anchor="end" class="label">30</text>

  <!-- X축 -->
  <line x1="60" y1="320" x2="250" y2="320" stroke="#999" stroke-width="1.5"/>

  <!-- 남성 막대 (48.8%) -->
  <rect x="80" y="112" width="55" height="208" fill="#4A90D9" rx="3" opacity="0.85"/>
  <text x="107" y="102" text-anchor="middle" class="value" fill="#4A90D9">48.8%</text>
  <text x="107" y="345" text-anchor="middle" class="label">남성</text>

  <!-- 여성 막대 (39.0%) -->
  <rect x="165" y="152" width="55" height="168" fill="#E57373" rx="3" opacity="0.85"/>
  <text x="192" y="142" text-anchor="middle" class="value" fill="#E57373">39.0%</text>
  <text x="192" y="345" text-anchor="middle" class="label">여성</text>

  <!-- 차이 브래킷 (왼쪽) -->
  <line x1="250" y1="112" x2="265" y2="112" stroke="#d32f2f" stroke-width="1.5"/>
  <line x1="265" y1="112" x2="265" y2="152" stroke="#d32f2f" stroke-width="1.5"/>
  <line x1="250" y1="152" x2="265" y2="152" stroke="#d32f2f" stroke-width="1.5"/>
  <text x="275" y="137" class="bracket-text">9.8%p</text>

  <!-- 구분선 -->
  <line x1="390" y1="30" x2="390" y2="380" stroke="#ddd" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- 오른쪽: 통제 후 -->
  <text x="575" y="35" text-anchor="middle" class="title">소득을 통제한 후</text>
  <text x="575" y="55" text-anchor="middle" class="annotation">(같은 소득 수준의 남녀 비교)</text>

  <!-- Y축 -->
  <line x1="460" y1="75" x2="460" y2="320" stroke="#999" stroke-width="1.5"/>

  <!-- Y축 눈금 -->
  <line x1="455" y1="95" x2="460" y2="95" stroke="#999"/>
  <text x="450" y="99" text-anchor="end" class="label">60</text>
  <line x1="455" y1="155" x2="460" y2="155" stroke="#999"/>
  <text x="450" y="159" text-anchor="end" class="label">45</text>
  <line x1="455" y1="215" x2="460" y2="215" stroke="#999"/>
  <text x="450" y="219" text-anchor="end" class="label">30</text>

  <!-- X축 -->
  <line x1="460" y1="320" x2="660" y2="320" stroke="#999" stroke-width="1.5"/>

  <!-- 남성 막대 (통제 후 44.5%) -->
  <rect x="485" y="130" width="55" height="190" fill="#4A90D9" rx="3" opacity="0.85"/>
  <text x="512" y="120" text-anchor="middle" class="value" fill="#4A90D9">44.5%</text>
  <text x="512" y="345" text-anchor="middle" class="label">남성</text>

  <!-- 여성 막대 (통제 후 37.3%) -->
  <rect x="575" y="159" width="55" height="161" fill="#E57373" rx="3" opacity="0.85"/>
  <text x="602" y="149" text-anchor="middle" class="value" fill="#E57373">37.3%</text>
  <text x="602" y="345" text-anchor="middle" class="label">여성</text>

  <!-- 차이 브래킷 (오른쪽) -->
  <line x1="650" y1="130" x2="665" y2="130" stroke="#d32f2f" stroke-width="1.5"/>
  <line x1="665" y1="130" x2="665" y2="159" stroke="#d32f2f" stroke-width="1.5"/>
  <line x1="650" y1="159" x2="665" y2="159" stroke="#d32f2f" stroke-width="1.5"/>
  <text x="675" y="149" class="bracket-text">7.2%p</text>

  <!-- 하단 설명 -->
  <rect x="100" y="365" width="600" height="28" fill="#fff3e0" rx="4" opacity="0.8"/>
  <text x="400" y="384" text-anchor="middle" font-size="13" fill="#e65100" font-weight="bold">소득이 같은 남녀를 비교하면, 성별 차이가 9.8%p → 7.2%p로 줄어든다 (2.6%p는 소득의 효과였다)</text>
</svg>