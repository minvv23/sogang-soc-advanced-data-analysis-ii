<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 500" font-family="Pretendard, Apple SD Gothic Neo, Malgun Gothic, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>

  <rect width="750" height="500" fill="#fafafa" rx="8"/>

  <text x="360" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">교차효과: 더미(성별) × 연속형(소득) — 음의 기울기 예시</text>
  <text x="360" y="52" text-anchor="middle" font-size="13" fill="#777">소득이 높을수록 부정선거론 수용률이 낮아지되, 남성에서 그 효과가 더 강하다</text>

  <!-- 축 -->
  <line x1="90" y1="410" x2="610" y2="410" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="90" y1="410" x2="90" y2="70" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="360" y="450" text-anchor="middle" font-size="14" font-weight="bold" fill="#444">소득 (백만 원)</text>
  <text x="35" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#444" transform="rotate(-90, 35, 240)">부정선거론 수용률 (%)</text>

  <!-- Y축 눈금 -->
  <line x1="85" y1="380" x2="90" y2="380" stroke="#aaa"/>
  <text x="78" y="384" text-anchor="end" font-size="12" fill="#666">20</text>
  <line x1="85" y1="320" x2="90" y2="320" stroke="#aaa"/>
  <text x="78" y="324" text-anchor="end" font-size="12" fill="#666">30</text>
  <line x1="85" y1="260" x2="90" y2="260" stroke="#aaa"/>
  <text x="78" y="264" text-anchor="end" font-size="12" fill="#666">40</text>
  <line x1="85" y1="200" x2="90" y2="200" stroke="#aaa"/>
  <text x="78" y="204" text-anchor="end" font-size="12" fill="#666">50</text>
  <line x1="85" y1="140" x2="90" y2="140" stroke="#aaa"/>
  <text x="78" y="144" text-anchor="end" font-size="12" fill="#666">60</text>

  <!-- X축 눈금 -->
  <line x1="170" y1="410" x2="170" y2="415" stroke="#aaa"/>
  <text x="170" y="430" text-anchor="middle" font-size="12" fill="#666">2</text>
  <line x1="270" y1="410" x2="270" y2="415" stroke="#aaa"/>
  <text x="270" y="430" text-anchor="middle" font-size="12" fill="#666">4</text>
  <line x1="370" y1="410" x2="370" y2="415" stroke="#aaa"/>
  <text x="370" y="430" text-anchor="middle" font-size="12" fill="#666">6</text>
  <line x1="470" y1="410" x2="470" y2="415" stroke="#aaa"/>
  <text x="470" y="430" text-anchor="middle" font-size="12" fill="#666">8</text>
  <line x1="570" y1="410" x2="570" y2="415" stroke="#aaa"/>
  <text x="570" y="430" text-anchor="middle" font-size="12" fill="#666">10</text>

  <!-- 그리드 -->
  <line x1="90" y1="380" x2="600" y2="380" stroke="#eee" stroke-dasharray="4,4"/>
  <line x1="90" y1="320" x2="600" y2="320" stroke="#eee" stroke-dasharray="4,4"/>
  <line x1="90" y1="260" x2="600" y2="260" stroke="#eee" stroke-dasharray="4,4"/>
  <line x1="90" y1="200" x2="600" y2="200" stroke="#eee" stroke-dasharray="4,4"/>
  <line x1="90" y1="140" x2="600" y2="140" stroke="#eee" stroke-dasharray="4,4"/>

  <!-- 매핑: X=0 -> x=90, 1단위=50px. Y% -> y = 410 - Y*6 -->
  <!-- 남성: Y = 52 - 2.2X -> @X=1: Y=49.8, y=111. @X=10: Y=30, y=230 -->
  <!-- 여성: Y = 38 - 0.5X -> @X=1: Y=37.5, y=185. @X=10: Y=33, y=212 -->

  <!-- 남성 회귀선 (파란색, 기울기 급함) -->
  <line x1="140" y1="111" x2="590" y2="230" stroke="#1565c0" stroke-width="3"/>
  <!-- 여성 회귀선 (빨간색, 기울기 완만) -->
  <line x1="140" y1="185" x2="590" y2="212" stroke="#c62828" stroke-width="3"/>

  <!-- 라벨 -->
  <rect x="148" y="88" width="96" height="22" fill="#e3f2fd" rx="4"/>
  <text x="196" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">남성 (M=1)</text>
  <rect x="148" y="192" width="96" height="22" fill="#fce4ec" rx="4"/>
  <text x="196" y="208" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">여성 (M=0)</text>

  <!-- 절편 차이 (β₁) -->
  <line x1="130" y1="111" x2="130" y2="185" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="125" y1="111" x2="135" y2="111" stroke="#ff9800" stroke-width="2"/>
  <line x1="125" y1="185" x2="135" y2="185" stroke="#ff9800" stroke-width="2"/>
  <text x="112" y="152" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">β₁</text>

  <!-- 남성 기울기 삼각형 -->
  <line x1="300" y1="155" x2="400" y2="155" stroke="#1565c0" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="400" y1="155" x2="400" y2="181" stroke="#1565c0" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="350" y="149" text-anchor="middle" font-size="11" fill="#1565c0">ΔX</text>
  <text x="422" y="173" font-size="12" font-weight="bold" fill="#1565c0">β₂+β₃</text>

  <!-- 여성 기울기 삼각형 -->
  <line x1="300" y1="197" x2="400" y2="197" stroke="#c62828" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="400" y1="197" x2="400" y2="203" stroke="#c62828" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="350" y="194" text-anchor="middle" font-size="11" fill="#c62828">ΔX</text>
  <text x="422" y="205" font-size="12" font-weight="bold" fill="#c62828">β₂</text>

  <!-- 범례 -->
  <rect x="630" y="100" width="112" height="170" fill="white" rx="6" stroke="#ddd" stroke-width="1"/>
  <text x="686" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">계수 해석</text>
  <line x1="642" y1="140" x2="668" y2="140" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="675" y="144" font-size="11" fill="#555">β₁: 절편 차이</text>
  <line x1="642" y1="166" x2="668" y2="166" stroke="#c62828" stroke-width="2.5"/>
  <text x="675" y="170" font-size="11" fill="#555">β₂: 여성 기울기</text>
  <line x1="642" y1="192" x2="668" y2="192" stroke="#1565c0" stroke-width="2.5"/>
  <text x="675" y="196" font-size="11" fill="#555">β₂+β₃:</text>
  <text x="675" y="210" font-size="11" fill="#555">남성 기울기</text>
  <rect x="638" y="224" width="98" height="30" fill="#fff3e0" rx="4"/>
  <text x="687" y="244" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">β₃ = 기울기 차이</text>

  <!-- 하단 수식 -->
  <rect x="90" y="458" width="560" height="34" fill="#f5f5f5" rx="5"/>
  <text x="370" y="480" text-anchor="middle" font-size="14" fill="#333">ŷ = β₀ + β₁·Male + β₂·소득 + </text>
  <text x="530" y="480" font-size="14" font-weight="bold" fill="#d32f2f">β₃·(Male × 소득)</text>
</svg>