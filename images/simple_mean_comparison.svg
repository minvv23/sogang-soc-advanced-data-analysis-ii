<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 350" font-family="Pretendard, Apple SD Gothic Neo, Malgun Gothic, sans-serif">
  <rect width="450" height="350" fill="#fafafa" rx="8"/>

  <text x="225" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">모형 1: 통제변수 없이 단순 평균 비교</text>

  <!-- Y축 -->
  <line x1="80" y1="60" x2="80" y2="270" stroke="#999" stroke-width="1.5"/>
  <text x="25" y="168" text-anchor="middle" font-size="12" fill="#555" transform="rotate(-90, 25, 168)">부정선거론 수용률 (%)</text>

  <!-- Y축 눈금 -->
  <line x1="75" y1="82" x2="80" y2="82" stroke="#999"/>
  <text x="70" y="86" text-anchor="end" font-size="11" fill="#666">60</text>
  <line x1="75" y1="130" x2="80" y2="130" stroke="#999"/>
  <text x="70" y="134" text-anchor="end" font-size="11" fill="#666">50</text>
  <line x1="75" y1="178" x2="80" y2="178" stroke="#999"/>
  <text x="70" y="182" text-anchor="end" font-size="11" fill="#666">40</text>
  <line x1="75" y1="226" x2="80" y2="226" stroke="#999"/>
  <text x="70" y="230" text-anchor="end" font-size="11" fill="#666">30</text>

  <!-- X축 -->
  <line x1="80" y1="270" x2="380" y2="270" stroke="#999" stroke-width="1.5"/>

  <!-- 남성 막대 (48.8%) — y = 270 - (48.8-20)*4.8 = 270 - 138.24 = 132 -->
  <rect x="120" y="132" width="80" height="138" fill="#4A90D9" rx="4" opacity="0.85"/>
  <text x="160" y="122" text-anchor="middle" font-size="18" font-weight="bold" fill="#4A90D9">48.8%</text>
  <text x="160" y="295" text-anchor="middle" font-size="13" fill="#555">남성</text>

  <!-- 여성 막대 (39.0%) — y = 270 - (39.0-20)*4.8 = 270 - 91.2 = 179 -->
  <rect x="240" y="179" width="80" height="91" fill="#E57373" rx="4" opacity="0.85"/>
  <text x="280" y="169" text-anchor="middle" font-size="18" font-weight="bold" fill="#E57373">39.0%</text>
  <text x="280" y="295" text-anchor="middle" font-size="13" fill="#555">여성</text>

  <!-- 차이 브래킷 -->
  <line x1="340" y1="132" x2="355" y2="132" stroke="#d32f2f" stroke-width="1.5"/>
  <line x1="355" y1="132" x2="355" y2="179" stroke="#d32f2f" stroke-width="1.5"/>
  <line x1="340" y1="179" x2="355" y2="179" stroke="#d32f2f" stroke-width="1.5"/>
  <text x="370" y="160" font-size="15" font-weight="bold" fill="#d32f2f">9.8%p</text>

  <!-- 하단 수식 -->
  <rect x="60" y="310" width="330" height="28" fill="#e3f2fd" rx="4"/>
  <text x="225" y="329" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">b1 = 48.8 - 39.0 = 9.8%p (남성 평균 - 여성 평균)</text>
</svg>