<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 300" font-family="'Noto Sans KR', Pretendard, sans-serif">
  <rect width="650" height="300" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="325" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">단순 비교는 왜 틀리는가: 선택 편향의 분해</text>

  <!-- Subtitle formula -->
  <text x="325" y="50" text-anchor="middle" font-size="11" fill="#666">처치군 평균 98,000 - 대조군 평균 57,000 = 관측된 차이 41,000</text>

  <!-- LEFT: 관측된 차이 bar -->
  <rect x="60" y="80" width="100" height="164" fill="#7E57C2" rx="4" opacity="0.85"/>
  <text x="110" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#7E57C2">관측된 차이</text>
  <text x="110" y="170" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">41,000</text>
  <text x="110" y="258" text-anchor="middle" font-size="10" fill="#666">처치군 − 대조군</text>

  <!-- Baseline -->
  <line x1="50" y1="244" x2="600" y2="244" stroke="#ccc" stroke-width="1"/>

  <!-- Equals sign -->
  <text x="210" y="172" text-anchor="middle" font-size="28" font-weight="bold" fill="#333">=</text>

  <!-- RIGHT: Decomposed bars -->
  <!-- ATT (bottom, blue) - 8,000 out of 41,000 => height = 164 * 8/41 = 32 -->
  <rect x="270" y="212" width="100" height="32" fill="#1565c0" rx="4" opacity="0.85"/>
  <text x="320" y="233" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">8,000</text>

  <!-- Selection bias (top, red/orange) - 33,000 out of 41,000 => height = 164 * 33/41 = 132 -->
  <rect x="270" y="80" width="100" height="132" fill="#e65100" rx="4" opacity="0.85"/>
  <text x="320" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">33,000</text>

  <!-- Labels for decomposed bars -->
  <!-- ATT bracket -->
  <line x1="380" y1="212" x2="395" y2="212" stroke="#1565c0" stroke-width="1.5"/>
  <line x1="395" y1="212" x2="395" y2="244" stroke="#1565c0" stroke-width="1.5"/>
  <line x1="380" y1="244" x2="395" y2="244" stroke="#1565c0" stroke-width="1.5"/>
  <text x="405" y="224" font-size="12" font-weight="bold" fill="#1565c0">ATT</text>
  <text x="405" y="240" font-size="10" fill="#1565c0">(진짜 인과효과)</text>

  <!-- Selection bias bracket -->
  <line x1="380" y1="80" x2="395" y2="80" stroke="#e65100" stroke-width="1.5"/>
  <line x1="395" y1="80" x2="395" y2="210" stroke="#e65100" stroke-width="1.5"/>
  <line x1="380" y1="210" x2="395" y2="210" stroke="#e65100" stroke-width="1.5"/>
  <text x="405" y="138" font-size="12" font-weight="bold" fill="#e65100">선택 편향</text>
  <text x="405" y="155" font-size="10" fill="#e65100">(원래부터 있던 차이)</text>

  <!-- Plus sign between stacked portions -->
  <text x="320" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">+</text>

  <!-- Bottom formula box -->
  <rect x="50" y="262" width="550" height="28" fill="#f5f5f5" rx="5" stroke="#ddd" stroke-width="1"/>
  <text x="325" y="281" text-anchor="middle" font-size="11" fill="#333">
    <tspan font-weight="bold" fill="#7E57C2">E[Y|D=1] - E[Y|D=0]</tspan>
    <tspan fill="#333"> = </tspan>
    <tspan font-weight="bold" fill="#1565c0">ATT</tspan>
    <tspan fill="#333"> + </tspan>
    <tspan font-weight="bold" fill="#e65100">E[Y(0)|D=1] - E[Y(0)|D=0]</tspan>
  </text>

  <!-- Annotation arrow: the bias is huge -->
  <line x1="520" y1="145" x2="400" y2="145" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="530" y="138" font-size="11" font-weight="bold" fill="#c62828">편향이 효과의</text>
  <text x="530" y="153" font-size="11" font-weight="bold" fill="#c62828">4배 이상!</text>
</svg>