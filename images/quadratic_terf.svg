<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <style>
      text { font-family: 'Noto Sans KR', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#ffffff"/>

  <!-- Plot area: x=80..720, y=40..380 -->
  <!-- Grid lines (light) -->
  <!-- Vertical grid lines at X=1,2,3,4,5 -->
  <!-- X mapping: 1->80+64=144, 2->80+192=272, 3->80+320=400, 4->80+448=528, 5->80+576=656 -->
  <!-- Actually let me define: plotLeft=100, plotRight=700, plotTop=50, plotBottom=380 -->
  <!-- X range: 1..5, so xScale = (700-100)/(5-1) = 150 per unit -->
  <!-- Y range: 0..10, so yScale = (380-50)/(10-0) = 33 per unit, y=0 -> 380, y=10 -> 50 -->

  <!-- Vertical grid lines at X = 1, 2, 3, 4, 5 -->
  <line x1="100" y1="50" x2="100" y2="380" stroke="#e9ecef" stroke-width="1"/>
  <line x1="250" y1="50" x2="250" y2="380" stroke="#e9ecef" stroke-width="1"/>
  <line x1="400" y1="50" x2="400" y2="380" stroke="#e9ecef" stroke-width="1"/>
  <line x1="550" y1="50" x2="550" y2="380" stroke="#e9ecef" stroke-width="1"/>
  <line x1="700" y1="50" x2="700" y2="380" stroke="#e9ecef" stroke-width="1"/>

  <!-- Horizontal grid lines at Y = 0, 2, 4, 6, 8, 10 -->
  <line x1="100" y1="380" x2="700" y2="380" stroke="#e9ecef" stroke-width="1"/>
  <line x1="100" y1="314" x2="700" y2="314" stroke="#e9ecef" stroke-width="1"/>
  <line x1="100" y1="248" x2="700" y2="248" stroke="#e9ecef" stroke-width="1"/>
  <line x1="100" y1="182" x2="700" y2="182" stroke="#e9ecef" stroke-width="1"/>
  <line x1="100" y1="116" x2="700" y2="116" stroke="#e9ecef" stroke-width="1"/>
  <line x1="100" y1="50" x2="700" y2="50" stroke="#e9ecef" stroke-width="1"/>

  <!-- Axes -->
  <line x1="100" y1="380" x2="700" y2="380" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="50" x2="100" y2="380" stroke="#333" stroke-width="1.5"/>

  <!-- X-axis tick labels -->
  <text x="100" y="400" text-anchor="middle" font-size="13" fill="#333">1</text>
  <text x="250" y="400" text-anchor="middle" font-size="13" fill="#333">2</text>
  <text x="400" y="400" text-anchor="middle" font-size="13" fill="#333">3</text>
  <text x="550" y="400" text-anchor="middle" font-size="13" fill="#333">4</text>
  <text x="700" y="400" text-anchor="middle" font-size="13" fill="#333">5</text>

  <!-- X-axis label -->
  <text x="400" y="432" text-anchor="middle" font-size="14" fill="#333" font-weight="500">페미니즘 지지 (1~5)</text>

  <!-- Y-axis tick labels -->
  <text x="90" y="384" text-anchor="end" font-size="13" fill="#333">0</text>
  <text x="90" y="318" text-anchor="end" font-size="13" fill="#333">2</text>
  <text x="90" y="252" text-anchor="end" font-size="13" fill="#333">4</text>
  <text x="90" y="186" text-anchor="end" font-size="13" fill="#333">6</text>
  <text x="90" y="120" text-anchor="end" font-size="13" fill="#333">8</text>
  <text x="90" y="54" text-anchor="end" font-size="13" fill="#333">10</text>

  <!-- Y-axis label (rotated) -->
  <text x="28" y="215" text-anchor="middle" font-size="14" fill="#333" font-weight="500" transform="rotate(-90, 28, 215)">트랜스젠더 권리 지지 (0~10)</text>

  <!-- Data points: inverted-U pattern peaking around X=3, Y~7.5 -->
  <!-- xPx = 100 + (x-1)*150, yPx = 380 - y*33 -->
  <!-- Quadratic model: Y = -1.8*(X-3)^2 + 7.5, so Y(1)=0.3, Y(2)=5.7, Y(3)=7.5, Y(4)=5.7, Y(5)=0.3 -->
  <!-- Adjusted: Y = -1.5*(X-3)^2 + 7.8 => Y(1)=1.8, Y(2)=6.3, Y(3)=7.8, Y(4)=6.3, Y(5)=1.8 -->

  <!-- ~45 scattered data points following inverted-U with noise -->
  <g fill="#adb5bd" opacity="0.7">
    <!-- X ~ 1.0-1.4 region: Y ~ 1-4 -->
    <circle cx="108" cy="347" r="4.5"/><!-- x=1.05, y=1.0 -->
    <circle cx="118" cy="314" r="4.5"/><!-- x=1.12, y=2.0 -->
    <circle cx="100" cy="330" r="4.5"/><!-- x=1.0, y=1.5 -->
    <circle cx="130" cy="297" r="4.5"/><!-- x=1.2, y=2.5 -->
    <circle cx="140" cy="281" r="4.5"/><!-- x=1.27, y=3.0 -->
    <circle cx="112" cy="363" r="4.5"/><!-- x=1.08, y=0.5 -->
    <circle cx="148" cy="264" r="4.5"/><!-- x=1.32, y=3.5 -->
    <circle cx="125" cy="340" r="4.5"/><!-- x=1.17, y=1.2 -->

    <!-- X ~ 1.5-2.0 region: Y ~ 3-6 -->
    <circle cx="175" cy="248" r="4.5"/><!-- x=1.5, y=4.0 -->
    <circle cx="198" cy="215" r="4.5"/><!-- x=1.65, y=5.0 -->
    <circle cx="220" cy="231" r="4.5"/><!-- x=1.8, y=4.5 -->
    <circle cx="240" cy="198" r="4.5"/><!-- x=1.93, y=5.5 -->
    <circle cx="188" cy="264" r="4.5"/><!-- x=1.59, y=3.5 -->
    <circle cx="210" cy="182" r="4.5"/><!-- x=1.73, y=6.0 -->
    <circle cx="250" cy="215" r="4.5"/><!-- x=2.0, y=5.0 -->
    <circle cx="195" cy="231" r="4.5"/><!-- x=1.63, y=4.5 -->

    <!-- X ~ 2.0-2.5 region: Y ~ 5-7.5 -->
    <circle cx="265" cy="182" r="4.5"/><!-- x=2.1, y=6.0 -->
    <circle cx="288" cy="149" r="4.5"/><!-- x=2.25, y=7.0 -->
    <circle cx="310" cy="165" r="4.5"/><!-- x=2.4, y=6.5 -->
    <circle cx="275" cy="198" r="4.5"/><!-- x=2.17, y=5.5 -->
    <circle cx="320" cy="132" r="4.5"/><!-- x=2.47, y=7.5 -->
    <circle cx="300" cy="182" r="4.5"/><!-- x=2.33, y=6.0 -->
    <circle cx="330" cy="149" r="4.5"/><!-- x=2.53, y=7.0 -->

    <!-- X ~ 2.5-3.5 region (peak): Y ~ 6-8.5 -->
    <circle cx="350" cy="132" r="4.5"/><!-- x=2.67, y=7.5 -->
    <circle cx="370" cy="116" r="4.5"/><!-- x=2.8, y=8.0 -->
    <circle cx="390" cy="105" r="4.5"/><!-- x=2.93, y=8.3 -->
    <circle cx="400" cy="116" r="4.5"/><!-- x=3.0, y=8.0 -->
    <circle cx="415" cy="99" r="4.5"/><!-- x=3.1, y=8.5 -->
    <circle cx="430" cy="116" r="4.5"/><!-- x=3.2, y=8.0 -->
    <circle cx="445" cy="132" r="4.5"/><!-- x=3.3, y=7.5 -->
    <circle cx="460" cy="149" r="4.5"/><!-- x=3.4, y=7.0 -->
    <circle cx="385" cy="132" r="4.5"/><!-- x=2.9, y=7.5 -->
    <circle cx="410" cy="138" r="4.5"/><!-- x=3.07, y=7.3 -->

    <!-- X ~ 3.5-4.0 region: Y ~ 4.5-7 -->
    <circle cx="480" cy="165" r="4.5"/><!-- x=3.53, y=6.5 -->
    <circle cx="510" cy="182" r="4.5"/><!-- x=3.73, y=6.0 -->
    <circle cx="530" cy="198" r="4.5"/><!-- x=3.87, y=5.5 -->
    <circle cx="550" cy="215" r="4.5"/><!-- x=4.0, y=5.0 -->
    <circle cx="495" cy="198" r="4.5"/><!-- x=3.63, y=5.5 -->
    <circle cx="520" cy="231" r="4.5"/><!-- x=3.8, y=4.5 -->
    <circle cx="540" cy="182" r="4.5"/><!-- x=3.93, y=6.0 -->

    <!-- X ~ 4.0-4.5 region: Y ~ 3-5 -->
    <circle cx="565" cy="248" r="4.5"/><!-- x=4.1, y=4.0 -->
    <circle cx="585" cy="264" r="4.5"/><!-- x=4.23, y=3.5 -->
    <circle cx="610" cy="231" r="4.5"/><!-- x=4.4, y=4.5 -->
    <circle cx="595" cy="281" r="4.5"/><!-- x=4.3, y=3.0 -->
    <circle cx="575" cy="215" r="4.5"/><!-- x=4.17, y=5.0 -->
    <circle cx="620" cy="264" r="4.5"/><!-- x=4.47, y=3.5 -->

    <!-- X ~ 4.5-5.0 region: Y ~ 0.5-3.5 -->
    <circle cx="640" cy="297" r="4.5"/><!-- x=4.6, y=2.5 -->
    <circle cx="660" cy="314" r="4.5"/><!-- x=4.73, y=2.0 -->
    <circle cx="680" cy="330" r="4.5"/><!-- x=4.87, y=1.5 -->
    <circle cx="700" cy="347" r="4.5"/><!-- x=5.0, y=1.0 -->
    <circle cx="650" cy="281" r="4.5"/><!-- x=4.67, y=3.0 -->
    <circle cx="690" cy="363" r="4.5"/><!-- x=4.93, y=0.5 -->
    <circle cx="670" cy="297" r="4.5"/><!-- x=4.8, y=2.5 -->
    <circle cx="655" cy="347" r="4.5"/><!-- x=4.7, y=1.0 -->
  </g>

  <!-- Linear fit line (dashed blue) -->
  <!-- Linear regression on inverted-U data: slope is nearly 0 or slightly positive -->
  <!-- With symmetric data, the linear fit is roughly flat around the mean Y ~ 4.8 -->
  <!-- Let's say: Y_hat = 4.3 + 0.15*X => Y(1)=4.45, Y(5)=5.05 -->
  <!-- yPx(4.45) = 380 - 4.45*33 = 233.15, yPx(5.05) = 380 - 5.05*33 = 213.35 -->
  <line x1="100" y1="233" x2="700" y2="213" stroke="#0055aa" stroke-width="2.5" stroke-dasharray="10,6" opacity="0.9"/>

  <!-- Quadratic fit curve (solid red) -->
  <!-- Y = -1.6*(X-3)^2 + 7.8 -->
  <!-- Sampling points from X=1 to X=5 in small steps -->
  <!-- X=1.0: Y = -1.6*4 + 7.8 = 1.4, px=(100, 380-1.4*33) = (100, 333.8) -->
  <!-- X=1.25: Y = -1.6*3.0625 + 7.8 = 2.9, px=(137.5, 284.3) -->
  <!-- X=1.5: Y = -1.6*2.25 + 7.8 = 4.2, px=(175, 241.4) -->
  <!-- X=1.75: Y = -1.6*1.5625 + 7.8 = 5.3, px=(212.5, 205.1) -->
  <!-- X=2.0: Y = -1.6*1.0 + 7.8 = 6.2, px=(250, 175.4) -->
  <!-- X=2.25: Y = -1.6*0.5625 + 7.8 = 6.9, px=(287.5, 152.3) -->
  <!-- X=2.5: Y = -1.6*0.25 + 7.8 = 7.4, px=(325, 135.8) -->
  <!-- X=2.75: Y = -1.6*0.0625 + 7.8 = 7.7, px=(362.5, 125.9) -->
  <!-- X=3.0: Y = 7.8, px=(400, 122.6) -->
  <!-- X=3.25: Y = 7.7, px=(437.5, 125.9) -->
  <!-- X=3.5: Y = 7.4, px=(475, 135.8) -->
  <!-- X=3.75: Y = 6.9, px=(512.5, 152.3) -->
  <!-- X=4.0: Y = 6.2, px=(550, 175.4) -->
  <!-- X=4.25: Y = 5.3, px=(587.5, 205.1) -->
  <!-- X=4.5: Y = 4.2, px=(625, 241.4) -->
  <!-- X=4.75: Y = 2.9, px=(662.5, 284.3) -->
  <!-- X=5.0: Y = 1.4, px=(700, 333.8) -->
  <polyline
    points="100,333.8 137.5,284.3 175,241.4 212.5,205.1 250,175.4 287.5,152.3 325,135.8 362.5,125.9 400,122.6 437.5,125.9 475,135.8 512.5,152.3 550,175.4 587.5,205.1 625,241.4 662.5,284.3 700,333.8"
    fill="none" stroke="#cc3333" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Turning point annotation at peak (X=3, Y=7.8) -->
  <circle cx="400" cy="122.6" r="5" fill="none" stroke="#cc3333" stroke-width="1.5"/>
  <line x1="400" y1="112" x2="400" y2="82" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="76" text-anchor="middle" font-size="12" fill="#555" font-weight="500">전환점 (turning point)</text>

  <!-- "선형 모형이 놓치는 부분" annotation on the right side -->
  <!-- At X~4.7, linear Y ~ 5.0 (yPx~215), quadratic Y ~ 3.2 (yPx~274) -->
  <!-- Show a bracket between the two lines -->
  <line x1="656" y1="214" x2="656" y2="280" stroke="#555" stroke-width="1.2"/>
  <line x1="652" y1="214" x2="660" y2="214" stroke="#555" stroke-width="1.2"/>
  <line x1="652" y1="280" x2="660" y2="280" stroke="#555" stroke-width="1.2"/>
  <!-- Arrow pointing to text -->
  <line x1="656" y1="247" x2="688" y2="247" stroke="#555" stroke-width="1"/>
  <text x="720" y="238" text-anchor="middle" font-size="11" fill="#555" font-weight="500">선형 모형이</text>
  <text x="720" y="254" text-anchor="middle" font-size="11" fill="#555" font-weight="500">놓치는 부분</text>

  <!-- Legend box (top-right) -->
  <rect x="490" y="52" width="200" height="72" rx="6" ry="6" fill="white" stroke="#ccc" stroke-width="1"/>

  <!-- Linear model legend entry -->
  <line x1="502" y1="74" x2="540" y2="74" stroke="#0055aa" stroke-width="2.5" stroke-dasharray="10,6"/>
  <text x="548" y="78" font-size="12" fill="#333">선형 모형: Y&#x0302; = β₀ + β₁X</text>

  <!-- Quadratic model legend entry -->
  <line x1="502" y1="104" x2="540" y2="104" stroke="#cc3333" stroke-width="2.8"/>
  <text x="548" y="108" font-size="12" fill="#333">2차 모형: Y&#x0302; = β₀+β₁X+β₂X²</text>
</svg>