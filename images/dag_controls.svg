<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420" font-family="Pretendard, Apple SD Gothic Neo, Malgun Gothic, sans-serif">
  <defs>
    <marker id="arrowB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2e7d32"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c62828"/>
    </marker>
    <marker id="arrowO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e65100"/>
    </marker>
  </defs>

  <rect width="750" height="420" fill="#fafafa" rx="8"/>

  <!-- 제목 -->
  <text x="375" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">통제변수 판단을 위한 세 가지 인과 구조 (DAG)</text>

  <!-- === 1. Confounder (교란 변수) === -->
  <text x="125" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">1. 교란 변수 (Confounder)</text>

  <!-- Z 노드 -->
  <circle cx="125" cy="110" r="28" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="125" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Z</text>

  <!-- X 노드 -->
  <circle cx="55" cy="200" r="28" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="55" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">X</text>

  <!-- Y 노드 -->
  <circle cx="195" cy="200" r="28" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="195" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">Y</text>

  <!-- Z -> X -->
  <line x1="103" y1="130" x2="73" y2="178" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowG)"/>
  <!-- Z -> Y -->
  <line x1="147" y1="130" x2="177" y2="178" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- 판정 -->
  <rect x="40" y="248" width="170" height="50" fill="#e8f5e9" rx="6"/>
  <text x="125" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">통제해야 한다</text>
  <text x="125" y="286" text-anchor="middle" font-size="11" fill="#2e7d32">안 넣으면 누락변수 편향</text>

  <!-- 예시 -->
  <text x="125" y="320" text-anchor="middle" font-size="11" fill="#666">Z = 부모 정치성향</text>
  <text x="125" y="336" text-anchor="middle" font-size="11" fill="#666">X = 성별, Y = 부정선거론</text>

  <!-- === 2. Collider (충돌 변수) === -->
  <text x="375" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#c62828">2. 충돌 변수 (Collider)</text>

  <!-- X 노드 -->
  <circle cx="305" cy="110" r="28" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="305" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">X</text>

  <!-- Y 노드 -->
  <circle cx="445" cy="110" r="28" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="445" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">Y</text>

  <!-- Z 노드 -->
  <circle cx="375" cy="200" r="28" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="375" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">Z</text>

  <!-- X -> Z -->
  <line x1="323" y1="132" x2="357" y2="178" stroke="#c62828" stroke-width="2" marker-end="url(#arrowR)"/>
  <!-- Y -> Z -->
  <line x1="427" y1="132" x2="393" y2="178" stroke="#c62828" stroke-width="2" marker-end="url(#arrowR)"/>

  <!-- 판정 -->
  <rect x="290" y="248" width="170" height="50" fill="#ffebee" rx="6"/>
  <text x="375" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">통제하면 안 된다</text>
  <text x="375" y="286" text-anchor="middle" font-size="11" fill="#c62828">넣으면 가짜 상관 생성</text>

  <!-- 예시 -->
  <text x="375" y="320" text-anchor="middle" font-size="11" fill="#666">X = 성별, Y = 부정선거론</text>
  <text x="375" y="336" text-anchor="middle" font-size="11" fill="#666">Z = 온라인 논쟁 참여</text>

  <!-- === 3. Mediator (매개 변수) === -->
  <text x="625" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">3. 매개 변수 (Mediator)</text>

  <!-- X 노드 -->
  <circle cx="555" cy="155" r="28" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="555" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">X</text>

  <!-- M 노드 -->
  <circle cx="625" cy="100" r="28" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="625" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">M</text>

  <!-- Y 노드 -->
  <circle cx="695" cy="155" r="28" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="695" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">Y</text>

  <!-- X -> M -->
  <line x1="577" y1="137" x2="603" y2="118" stroke="#e65100" stroke-width="2" marker-end="url(#arrowO)"/>
  <!-- M -> Y -->
  <line x1="647" y1="118" x2="673" y2="137" stroke="#e65100" stroke-width="2" marker-end="url(#arrowO)"/>
  <!-- X -> Y (직접) -->
  <line x1="583" y1="160" x2="667" y2="160" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowB)"/>
  <text x="625" y="178" text-anchor="middle" font-size="10" fill="#999">(직접 효과)</text>

  <!-- 판정 -->
  <rect x="540" y="248" width="170" height="50" fill="#fff3e0" rx="6"/>
  <text x="625" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">목적에 따라 다르다</text>
  <text x="625" y="286" text-anchor="middle" font-size="11" fill="#e65100">총효과 원하면 빼고</text>

  <!-- 예시 -->
  <text x="625" y="320" text-anchor="middle" font-size="11" fill="#666">X = 성별</text>
  <text x="625" y="336" text-anchor="middle" font-size="11" fill="#666">M = 커뮤니티 노출, Y = 부정선거론</text>

  <!-- 하단 요약 -->
  <rect x="60" y="365" width="630" height="42" fill="#f5f5f5" rx="6" stroke="#ddd"/>
  <text x="375" y="385" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">핵심: "관련 있어 보이니까 통제했다"는 최악의 근거다.</text>
  <text x="375" y="400" text-anchor="middle" font-size="12" fill="#666">DAG를 그려서 변수의 인과적 위치를 먼저 파악한 뒤 통제 여부를 결정해야 한다.</text>
</svg>